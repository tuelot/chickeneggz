<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chicken Eggz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #0a0f1e; color: #fff; touch-action: none; user-select: none; }
    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .bg-layer img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .bg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,15,30,0.1); z-index: 1; }
    .page-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; width: 100vw; padding: 10px; padding-bottom: 80px; }
    header { display: flex; justify-content: center; align-items: center; background: rgba(135,206,235,0.85); padding: 5px 15px; margin-top: 40px; margin-right: 50px; margin-left: 50px; border-radius: 12px; backdrop-filter: blur(10px); border: 8px solid #fff; box-shadow: 0 0 12px #fff, inset 0 0 12px #00aaff; }
    .logo { font-family: 'Fredoka One', cursive; color: #fff; text-shadow: 0 0 20px #00aaff; font-size: 30px; }
    .main-game-area { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 5px; position: relative; overflow: hidden; border-radius: 12px; margin-top: 5px; }
    #gameCanvas { display: block; width: 100%; height: 100%; background: transparent; cursor: crosshair; touch-action: none; }
    .notification { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(239,68,68,0.9); padding: 12px 24px; border-radius: 8px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 10000; font-size: 14px; }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .level-up-notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(0,242,254,0.95); padding: 20px 40px; border-radius: 16px; border: 4px solid #fff; box-shadow: 0 0 30px #00f2fe, 0 0 60px rgba(0,242,254,0.5); opacity: 0; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; z-index: 10001; text-align: center; }
    .level-up-notification.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .level-up-notification h2 { font-family: 'Orbitron', sans-serif; font-size: 28px; color: #0a0f1e; text-shadow: 0 0 10px #fff; margin-bottom: 8px; }
    .level-up-notification p { font-family: 'Poppins', sans-serif; font-size: 14px; color: #0a0f1e; }
    .footer-stats { position: fixed; bottom: 48px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 24px; padding: 4px 12px; z-index: 1001; pointer-events: none; background: transparent; }
    .footer-stat { display: flex; align-items: center; gap: 8px; }
    .footer-stat-label { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #00f2fe; }
    .footer-stat-value { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 900; color: #fff; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; background: transparent; padding: 4px 0 6px; z-index: 500; pointer-events: auto; height: 48px; }
    .bottom-nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: #D7CCC8; padding: 2px 12px; border-radius: 8px; transition: all 0.2s; min-width: 60px; }
    .bottom-nav-btn:hover { color: #fff; }
    .bottom-nav-icon { font-size: 16px; }
    .bottom-nav-label { font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 1000; letter-spacing: 0.5px; text-transform: uppercase; color: #fff; }
    .auth-bar { position: fixed; top: 8px; right: 12px; z-index: 10000; display: flex; align-items: center; gap: 8px; }
    .auth-bar span { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #a0b0d0; }
    .auth-btn { background: rgba(255,0,125,0.8); border: none; color: #fff; padding: 4px 10px; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 9px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="bg-layer"><img src="Green.png" alt="Green Background"></div>
  <div class="bg-overlay"></div>
  <div class="auth-bar" id="authBar">
    <span id="userName">Guest</span>
    <button class="auth-btn" id="authBtn" onclick="toggleAuth()">Login</button>
  </div>
  <div class="page-wrapper">
    <header><div class="logo">Chicken Eggz</div></header>
    <div class="main-game-area" id="gameArea"><canvas id="gameCanvas"></canvas></div>
  </div>
  <div class="footer-stats">
    <div class="footer-stat">
      <span class="footer-stat-label">Level</span>
      <span class="footer-stat-value" id="level-display">1</span>
    </div>
    <div class="footer-stat">
      <span class="footer-stat-label">Eggz</span>
      <span class="footer-stat-value" id="coin-balance">0</span>
    </div>
    <div class="footer-stat">
      <span class="footer-stat-label">Next Lvl</span>
      <span class="footer-stat-value" id="next-level">20</span>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="chat.html" class="bottom-nav-btn"><span class="bottom-nav-icon">💬</span><span class="bottom-nav-label">Chat</span></a>
    <a href="cash.html" class="bottom-nav-btn"><span class="bottom-nav-icon">💵</span><span class="bottom-nav-label">Cash</span></a>
    <a href="index.html" class="bottom-nav-btn"><span class="bottom-nav-icon">❌</span><span class="bottom-nav-label">Exit</span></a>
  </nav>
  <div id="notification" class="notification"></div>
  <div id="levelUpNotification" class="level-up-notification">
    <h2>LEVEL UP!</h2>
    <p id="levelUpText">Level 2 Unlocked!</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBleBA1kmdnkQxGlOOCEhP7gPMUJ-q3Hkg",
  authDomain: "chickeneggz.firebaseapp.com",
  projectId: "chickeneggz",
  storageBucket: "chickeneggz.firebasestorage.app",
  messagingSenderId: "378281633320",
  appId: "1:378281633320:web:2b6d668d3631e031a5f71d"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userDocRef = null;
    let isGuest = false;
    let syncTimeout = null;

    // ===== STATE =====
    let coins = 0;
    let level = 1;
    let totalEarned = 0;
    let gameActive = true;
    let comboCount = 0;
    let lastHitTime = 0;
    const COMBO_WINDOW = 2000;
    const MAX_COMBO = 10;
    const BASE_BIRD_COUNT = 10;

    function getLevelThreshold(lvl) { return Math.floor(20 * Math.pow(1.5, lvl - 1)); }
    function getBirdCountForLevel(lvl) { return BASE_BIRD_COUNT + Math.floor((lvl - 1) * 1.5); }
    function getBirdSpeedMultiplier(lvl) { return 1 + (lvl - 1) * 0.15; }

    function showNotification(msg) {
      var n = document.getElementById('notification');
      if (!n) return;
      n.textContent = msg;
      n.classList.add('show');
      setTimeout(function() { n.classList.remove('show'); }, 4000);
    }

    function showLevelUp(newLevel) {
      var n = document.getElementById('levelUpNotification');
      var t = document.getElementById('levelUpText');
      if (!n || !t) return;
      t.textContent = 'Level ' + newLevel + ' Unlocked! Birds getting faster...';
      n.classList.add('show');
      setTimeout(function() { n.classList.remove('show'); }, 2500);
    }

    // ===== AUTH =====
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        isGuest = false;
        document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
        document.getElementById('authBtn').textContent = 'Logout';
        userDocRef = doc(db, 'users', user.uid);
        await loadUserData();
        listenForDeposits();
      } else {
        currentUser = null;
        isGuest = localStorage.getItem('chickenEmpire_v1.guest') === 'true';
        if (!isGuest) {
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('userName').textContent = 'Guest';
        document.getElementById('authBtn').textContent = 'Login';
        coins = parseInt(localStorage.getItem('chickenEmpire_v1.eggs')) || 0;
        level = parseInt(localStorage.getItem('chickenEmpire_v1.level')) || 1;
        totalEarned = parseInt(localStorage.getItem('chickenEmpire_v1.totalEarned')) || 0;
        updateHUD();
      }
    });

    window.toggleAuth = function() {
      if (currentUser) {
        signOut(auth).then(() => { localStorage.removeItem('chickenEmpire_v1.guest'); window.location.href = 'login.html'; });
      } else {
        window.location.href = 'login.html';
      }
    };

    async function loadUserData() {
      if (!userDocRef) return;
      const snap = await getDoc(userDocRef);
      if (snap.exists()) {
        const data = snap.data();
        coins = data.eggs || 0;
        level = data.level || 1;
        totalEarned = data.totalEarned || 0;
      } else {
        // Create doc if missing
        await setDoc(userDocRef, {
          uid: currentUser.uid, email: currentUser.email, name: currentUser.displayName || currentUser.email.split('@')[0],
          eggs: 0, level: 1, totalEarned: 0, isAdmin: currentUser.email === 'admin@chicken.com',
          isBlocked: false, createdAt: serverTimestamp()
        });
      }
      updateHUD();
    }

    function syncToFirestore() {
      if (!userDocRef || isGuest) return;
      if (syncTimeout) clearTimeout(syncTimeout);
      syncTimeout = setTimeout(async () => {
        try {
          await updateDoc(userDocRef, { eggs: coins, level: level, totalEarned: totalEarned, updatedAt: serverTimestamp() });
        } catch (e) { console.error('Sync error:', e); }
      }, 2000);
    }

    function listenForDeposits() {
      if (!currentUser) return;
      // Listen for approved deposits on this user
      // This is a simplified approach - in production you'd use a subcollection or query
    }

    // ===== HUD =====
    function updateHUD() {
      var bal = document.getElementById('coin-balance');
      var lvl = document.getElementById('level-display');
      var next = document.getElementById('next-level');
      if (bal) bal.textContent = coins + ' Eggz (R' + (coins * 0.10).toFixed(2) + ')';
      if (lvl) lvl.textContent = level;
      var threshold = getLevelThreshold(level);
      var progress = totalEarned - getLevelThreshold(level - 1);
      var needed = threshold - getLevelThreshold(level - 1);
      if (next) next.textContent = Math.max(0, needed - progress);
      if (isGuest) {
        localStorage.setItem('chickenEmpire_v1.eggs', coins);
        localStorage.setItem('chickenEmpire_v1.level', level);
        localStorage.setItem('chickenEmpire_v1.totalEarned', totalEarned);
      } else {
        syncToFirestore();
      }
    }

    function checkLevelUp() {
      var prevLevel = level;
      while (totalEarned >= getLevelThreshold(level)) { level++; }
      if (level > prevLevel) {
        showLevelUp(level);
        var targetCount = getBirdCountForLevel(level);
        while (birds.length < targetCount) { birds.push(new Bird(false)); }
        birds.forEach(function(b) { if (!b.isMother) { b.speed = (Math.random() * 2 + 1.5) * getBirdSpeedMultiplier(level); } });
      }
    }

    // ===== CANVAS =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameArea = document.getElementById('gameArea');
    const slingshot = { x: 0, y: 0, baseRadius: 35, elasticX: 0, elasticY: 0, isDragging: false, maxPull: 90 };
    const birds = [];
    const projectiles = [];
    const particles = [];
    const floatingTexts = [];

    function resizeCanvas() {
      if (!gameArea) return;
      canvas.width = gameArea.clientWidth;
      canvas.height = gameArea.clientHeight;
      slingshot.x = canvas.width / 2;
      slingshot.y = canvas.height - 60;
      if (!slingshot.isDragging) { slingshot.elasticX = slingshot.x; slingshot.elasticY = slingshot.y; }
    }
    window.addEventListener('resize', resizeCanvas);

    class Bird {
      constructor(isMother) {
        this.isMother = isMother;
        this.type = isMother ? 'mother' : 'normal';
        this.color = isMother ? '#2E8B57' : '#00d2ff';
        this.reset();
      }
      getRandomNormalColor() {
        var rand = Math.random();
        if (rand < 0.33) return '#FFAA00';
        if (rand < 0.66) return '#00FFFF';
        return '#FF00AA';
      }
      reset() {
        if (!this.isMother) {
          var r = Math.random();
          if (r < 0.03) { this.type = 'bomb'; this.color = '#FF0033'; }
          else if (r < 0.08) { this.type = 'golden'; this.color = '#FFE600'; }
          else if (r < 0.16) { this.type = 'rainbow'; this.color = 'rainbow'; }
          else { this.type = 'normal'; this.color = this.getRandomNormalColor(); }
        } else { this.type = 'mother'; this.color = '#4169E1'; }
        this.radius = this.isMother ? 38 : (this.type === 'golden' ? 22 : (this.type === 'bomb' ? 20 : 16));
        this.speed = this.isMother ? (Math.random() * 0.8 + 0.6) : (Math.random() * 2 + 1.5) * getBirdSpeedMultiplier(level);
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.x = this.direction === 1 ? -this.radius - Math.random() * 200 : canvas.width + this.radius + Math.random() * 200;
        this.y = this.isMother ? (canvas.height * 0.25) + Math.random() * 80 : (canvas.height * 0.08) + Math.random() * 160;
        this.wingWave = Math.random() * Math.PI;
        this.wingSpeed = this.isMother ? 0.08 : 0.25;
        this.blinkTimer = Math.random() * 100 + 50;
        this.pulseTimer = 0;
      }
      update() {
        this.x += this.speed * this.direction;
        this.wingWave += this.wingSpeed;
        this.blinkTimer--;
        this.pulseTimer += 0.05;
        if (this.blinkTimer <= 0) this.blinkTimer = Math.random() * 200 + 100;
        if (this.direction === 1 && this.x > canvas.width + this.radius) this.reset();
        if (this.direction === -1 && this.x < -this.radius) this.reset();
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.direction === -1) ctx.scale(-1, 1);
        var flap = Math.sin(this.wingWave);
        let fillStyle = this.color;
        if (this.type === 'rainbow') {
          let gradient = ctx.createLinearGradient(-this.radius, 0, this.radius, 0);
          gradient.addColorStop(0.0, '#FF0000'); gradient.addColorStop(0.2, '#FF7F00'); gradient.addColorStop(0.4, '#FFFF00');
          gradient.addColorStop(0.6, '#00FF00'); gradient.addColorStop(0.8, '#0000FF'); gradient.addColorStop(1.0, '#8B00FF');
          fillStyle = gradient;
        }
        ctx.fillStyle = fillStyle; ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.ellipse(-5, flap * 5, this.radius * 0.8, this.radius * 1.3, (flap * 25 * Math.PI) / 180, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1.0;
        ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fillStyle = fillStyle; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.radius * 0.35, -this.radius * 0.25, this.radius * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.radius * 0.4, -this.radius * 0.3, this.radius * 0.07, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.moveTo(this.radius * 0.8, -this.radius * 0.1); ctx.lineTo(this.radius * 1.3, this.radius * 0.05); ctx.lineTo(this.radius * 0.7, this.radius * 0.3); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    class Projectile {
      constructor(sx, sy, tx, ty) {
        this.x = sx; this.y = sy;
        var angle = Math.atan2(ty - sy, tx - sx);
        this.vx = Math.cos(angle) * 14; this.vy = Math.sin(angle) * 14;
        this.radius = 6; this.active = true;
      }
      update() { this.x += this.vx; this.y += this.vy; if (this.y < -20 || this.x < -20 || this.x > canvas.width + 20) this.active = false; }
      draw() { ctx.save(); ctx.shadowColor = '#00f2fe'; ctx.shadowBlur = 15; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    }

    class Particle {
      constructor(x, y, color) { this.x = x; this.y = y; this.color = color === 'rainbow' ? '#ff00ff' : color; var a = Math.random() * Math.PI * 2; var s = Math.random() * 4 + 1; this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s; this.alpha = 1; this.decay = 0.02 + Math.random() * 0.015; this.size = 2 + Math.random() * 2; }
      update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
      draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    }

    class FloatingText {
      constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color === 'rainbow' ? '#ff00ff' : color; this.alpha = 1; this.vy = -1.2; }
      update() { this.y += this.vy; this.alpha -= 0.012; }
      draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.font = 'bold 18px Arial'; ctx.shadowColor = '#000'; ctx.shadowBlur = 6; ctx.textAlign = 'center'; ctx.fillText(this.text, this.x, this.y); ctx.restore(); }
    }

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var cx = e.touches ? e.touches[0].clientX : e.clientX;
      var cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
    }
    function onStart(e) { if (!gameActive) return; var pos = getPos(e); if (Math.hypot(pos.x - slingshot.x, pos.y - slingshot.y) < slingshot.baseRadius + 30) { slingshot.isDragging = true; } }
    function onMove(e) { if (!slingshot.isDragging || !gameActive) return; if (e.type === 'touchmove') e.preventDefault(); var pos = getPos(e); var dx = pos.x - slingshot.x; var dy = pos.y - slingshot.y; var dist = Math.hypot(dx, dy); if (dist > slingshot.maxPull) { var angle = Math.atan2(dy, dx); slingshot.elasticX = slingshot.x + Math.cos(angle) * slingshot.maxPull; slingshot.elasticY = slingshot.y + Math.sin(angle) * slingshot.maxPull; } else { slingshot.elasticX = pos.x; slingshot.elasticY = pos.y; } }
    function onEnd() { if (!slingshot.isDragging || !gameActive) return; slingshot.isDragging = false; var dx = slingshot.x - slingshot.elasticX; var dy = slingshot.y - slingshot.elasticY; if (Math.hypot(dx, dy) > 10) { projectiles.push(new Projectile(slingshot.x, slingshot.y, slingshot.x + dx * 3, slingshot.y + dy * 3)); } slingshot.elasticX = slingshot.x; slingshot.elasticY = slingshot.y; }
    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);

    function handleHit(bird) {
      if (!gameActive) return;
      if (navigator.vibrate) navigator.vibrate(50);
      var now = Date.now();
      if (now - lastHitTime < COMBO_WINDOW) { comboCount++; } else { comboCount = 1; }
      lastHitTime = now;
      var comboMultiplier = Math.min(comboCount, MAX_COMBO);
      for (var k = 0; k < 15; k++) { particles.push(new Particle(bird.x, bird.y, bird.color)); }
      var rewardAmount = 0; var rewardText = ''; var rewardColor = '#ffd700';
      if (bird.isMother) {
        comboCount = 0; var penalty = Math.min(coins, 10); coins -= penalty;
        rewardText = '-' + penalty + ' Eggz (-R' + (penalty * 0.10).toFixed(2) + ')'; rewardColor = '#ff4b4b';
        showNotification('MOTHER BIRD! -' + penalty + ' Eggz (-R' + (penalty * 0.10).toFixed(2) + ')! Combo lost!');
      } else {
        if (bird.type === 'golden') { rewardAmount = 5 * comboMultiplier; rewardText = '+' + rewardAmount + ' (+R' + (rewardAmount * 0.10).toFixed(2) + ')'; rewardColor = '#FFE600'; }
        else if (bird.type === 'rainbow') { rewardAmount = 3 * comboMultiplier; rewardText = '+' + rewardAmount + ' (+R' + (rewardAmount * 0.10).toFixed(2) + ')'; rewardColor = '#ff00ff'; }
        else if (bird.type === 'bomb') { rewardAmount = -10; rewardText = '-10 (-R1.00)'; rewardColor = '#FF0033'; comboCount = 0; showNotification('BOMB BIRD! -10 Eggz (-R1.00)!'); }
        else { rewardAmount = comboMultiplier; rewardText = (comboCount > 1 ? 'x' + comboMultiplier + ' ' : '+') + rewardAmount + ' (+R' + (rewardAmount * 0.10).toFixed(2) + ')'; rewardColor = bird.color === 'rainbow' ? '#ff00ff' : bird.color; }
        coins += rewardAmount;
        if (rewardAmount > 0) totalEarned += rewardAmount;
      }
      updateHUD(); checkLevelUp();
      floatingTexts.push(new FloatingText(bird.x, bird.y, rewardText, rewardColor));
      if (comboCount > 1 && !bird.isMother && bird.type !== 'bomb') { floatingTexts.push(new FloatingText(bird.x, bird.y - 30, 'COMBO x' + comboCount + '!', '#00f2fe')); }
      bird.reset();
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (gameActive) {
        birds.forEach(function(b) { b.update(); });
        for (var i = projectiles.length - 1; i >= 0; i--) {
          var p = projectiles[i]; p.update();
          if (!p.active) { projectiles.splice(i, 1); continue; }
          for (var j = 0; j < birds.length; j++) {
            var b = birds[j];
            if (Math.hypot(p.x - b.x, p.y - b.y) < b.radius + p.radius) { p.active = false; projectiles.splice(i, 1); handleHit(b); break; }
          }
        }
        for (var i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].alpha <= 0) particles.splice(i, 1); }
        for (var i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(); if (floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1); }
      }
      ctx.strokeStyle = 'rgba(0,242,254,0.3)'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(slingshot.x, slingshot.y); ctx.lineTo(slingshot.x, canvas.height); ctx.stroke();
      if (slingshot.isDragging) {
        ctx.strokeStyle = '#00f2fe'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(slingshot.x - 20, slingshot.y); ctx.lineTo(slingshot.elasticX, slingshot.elasticY);
        ctx.moveTo(slingshot.x + 20, slingshot.y); ctx.lineTo(slingshot.elasticX, slingshot.elasticY); ctx.stroke();
      }
      ctx.save(); ctx.shadowColor = '#00f2fe'; ctx.shadowBlur = slingshot.isDragging ? 20 : 10;
      ctx.fillStyle = slingshot.isDragging ? '#fff' : '#00f2fe';
      ctx.beginPath(); ctx.arc(slingshot.elasticX, slingshot.elasticY, 14, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      birds.forEach(function(b) { b.draw(); });
      projectiles.forEach(function(p) { p.draw(); });
      particles.forEach(function(p) { p.draw(); });
      floatingTexts.forEach(function(t) { t.draw(); });
    }

    function init() {
      resizeCanvas();
      birds.push(new Bird(true));
      var targetCount = getBirdCountForLevel(level);
      for (var i = 0; i < targetCount; i++) { birds.push(new Bird(false)); }
      updateHUD();
      requestAnimationFrame(gameLoop);
    }
    init();
  </script>
</body>
</html>
