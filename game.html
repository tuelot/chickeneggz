<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chicken Eggz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #0a0f1e; color: #fff; touch-action: none; user-select: none; }
    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .bg-layer img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .bg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,15,30,0.1); z-index: 1; }
    .page-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; width: 100vw; padding: 10px; padding-bottom: 80px; }
    header { display: flex; justify-content: center; align-items: center; padding: 5px 15px; margin-top: 40px; margin-right: 50px; margin-left: 50px; position: relative; }
    .main-game-area { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 5px; position: relative; overflow: hidden; border-radius: 12px; margin-top: 5px; }
    #gameCanvas { display: block; width: 100%; height: 100%; background: transparent; cursor: crosshair; touch-action: none; }
    .notification { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(239,68,68,0.9); padding: 12px 24px; border-radius: 8px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 10000; font-size: 14px; }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .level-up-notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(0,242,254,0.95); padding: 20px 40px; border-radius: 16px; border: 4px solid #fff; box-shadow: 0 0 30px #00f2fe, 0 0 60px rgba(0,242,254,0.5); opacity: 0; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; z-index: 10001; text-align: center; }
    .level-up-notification.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .level-up-notification h2 { font-family: 'Orbitron', sans-serif; font-size: 28px; color: #0a0f1e; text-shadow: 0 0 10px #fff; margin-bottom: 8px; }
    .level-up-notification p { font-family: 'Poppins', sans-serif; font-size: 14px; color: #0a0f1e; }
    .footer-stats { position: fixed; bottom: 48px; left: 0; width: 100%; display: flex; justify-content: center; align-items: center; gap: 24px; padding: 4px 12px; z-index: 1001; pointer-events: none; background: transparent; }
    .footer-stat { display: flex; align-items: center; gap: 8px; }
    .footer-stat-label { font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #00f2fe; }
    .footer-stat-value { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 900; color: #fff; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; background: transparent; padding: 4px 0 6px; z-index: 500; pointer-events: auto; height: 48px; }
    .bottom-nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; text-decoration: none; color: #D7CCC8; padding: 2px 12px; border-radius: 8px; transition: all 0.2s; min-width: 60px; }
    .bottom-nav-btn:hover { color: #fff; }
    .bottom-nav-icon { font-size: 16px; }
    .bottom-nav-label { font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 1000; letter-spacing: 0.5px; text-transform: uppercase; color: #fff; }

    /* ===== PUMP.FUN STYLE COIN INFO ===== */
    .coin-info {
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 0, 1);
      border-radius: 10px;
      padding: 6px 14px;
      text-align: center;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(0, 242, 254, 0.15);
    }
    .coin-info .coin-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 1000;
      color: #00f2fe;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .coin-info .coin-price {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 1000;
      color: rgba(255, 255, 0, 1);
      text-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
    }
    .coin-info .coin-cap {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 1000;
      color: #00ff88;
      margin-top: 1px;
    }
    .coin-info .coin-divider {
      color: #4a5568;
      margin: 0 4px;
    }

    /* ===== SOUND TOGGLE BUTTON ===== */
    .sound-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10002;
      background: rgba(10, 15, 30, 0.85);
      border: 2px solid #00f2fe;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      color: #00f2fe;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .sound-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
    }
    .sound-toggle.muted {
      border-color: #ff4444;
      color: #ff4444;
    }

    /* ===== SCREEN FLASH OVERLAY ===== */
    .screen-flash {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9998;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .screen-flash.red { background: radial-gradient(circle, rgba(255,0,0,0.3) 0%, transparent 70%); }
    .screen-flash.gold { background: radial-gradient(circle, rgba(255,215,0,0.25) 0%, transparent 70%); }
    .screen-flash.cyan { background: radial-gradient(circle, rgba(0,242,254,0.2) 0%, transparent 70%); }
    .screen-flash.show { opacity: 1; }

    /* ===== COMBO COUNTER ===== */
    .combo-display {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10003;
      pointer-events: none;
      text-align: center;
      opacity: 0;
      transition: all 0.3s;
    }
    .combo-display.show { opacity: 1; }
    .combo-display .combo-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 64px;
      font-weight: 900;
      color: #00f2fe;
      text-shadow: 0 0 20px #00f2fe, 0 0 40px rgba(0,242,254,0.5);
      animation: comboPulse 0.5s ease-out;
    }
    .combo-display .combo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,242,254,0.8);
      letter-spacing: 4px;
    }
    @keyframes comboPulse {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-layer"><img src="Green.png" alt="Green Background"></div>
  <div class="bg-overlay"></div>
  <div class="page-wrapper">
    <header>
      <div class="coin-info" id="coinInfo">
        <div class="coin-name">EGGZ / USD · ZAR</div>
        <div class="coin-price" id="coinPrice">$0.0055 <span class="coin-divider">|</span> R0.10</div>
        <div class="coin-cap" id="coinCap">MCap: $55.0M <span class="coin-divider">|</span> R1.0B</div>
      </div>
    </header>
    <div class="main-game-area" id="gameArea"><canvas id="gameCanvas"></canvas></div>
  </div>

  <!-- Sound Toggle -->
  <button class="sound-toggle" id="soundToggle" title="Toggle Sound">🔊</button>

  <!-- Screen Flash Overlay -->
  <div class="screen-flash" id="screenFlash"></div>

  <!-- Combo Display -->
  <div class="combo-display" id="comboDisplay">
    <div class="combo-number" id="comboNumber">x5</div>
    <div class="combo-text">COMBO</div>
  </div>

  <div class="footer-stats">
    <div class="footer-stat">
      <span class="footer-stat-label">Level</span>
      <span class="footer-stat-value" id="level-display">1</span>
    </div>
    <div class="footer-stat">
      <span class="footer-stat-label">Next Lvl</span>
      <span class="footer-stat-value" id="next-level">1000</span>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="chat.html" class="bottom-nav-btn"><span class="bottom-nav-icon">💬</span><span class="bottom-nav-label">Chat</span></a>
    <a href="cash.html" class="bottom-nav-btn"><span class="bottom-nav-icon">💵</span><span class="bottom-nav-label">Cash</span></a>
    <a href="index.html" class="bottom-nav-btn"><span class="bottom-nav-icon">❌</span><span class="bottom-nav-label">Exit</span></a>
  </nav>
  <div id="notification" class="notification"></div>
  <div id="levelUpNotification" class="level-up-notification">
    <h2>LEVEL UP!</h2>
    <p id="levelUpText">Level 2 Unlocked!</p>
  </div>

  <script>
    // ===== AUDIO ENGINE (Web Audio API - No External Files) =====
    const AudioEngine = {
      ctx: null,
      enabled: true,
      masterGain: null,
      initialized: false,

      init() {
        if (this.initialized) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.masterGain = this.ctx.createGain();
          this.masterGain.gain.value = 0.4;
          this.masterGain.connect(this.ctx.destination);
          this.initialized = true;
        } catch (e) {
          console.warn('Web Audio API not supported');
        }
      },

      resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      },

      // Synthesize a laser/whoosh launch sound
      playLaunch() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, t);
        osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(2000, t);
        filter.frequency.exponentialRampToValueAtTime(200, t + 0.15);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        osc.start(t);
        osc.stop(t + 0.15);
      },

      // Synthesize a satisfying pop/hit sound
      playHit(pitch) {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(pitch || 600, t);
        osc.frequency.exponentialRampToValueAtTime((pitch || 600) * 0.5, t + 0.1);
        gain.gain.setValueAtTime(0.4, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(t);
        osc.stop(t + 0.12);
      },

      // Synthesize a golden bird chime
      playGoldenHit() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t + i * 0.08);
          gain.gain.linearRampToValueAtTime(0.25, t + i * 0.08 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.08 + 0.2);
          osc.connect(gain);
          gain.connect(this.masterGain);
          osc.start(t + i * 0.08);
          osc.stop(t + i * 0.08 + 0.25);
        });
      },

      // Synthesize a bomb explosion
      playExplosion() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const bufferSize = this.ctx.sampleRate * 0.4;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, t);
        filter.frequency.exponentialRampToValueAtTime(100, t + 0.3);
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        noise.start(t);
        noise.stop(t + 0.4);

        // Low rumble
        const osc = this.ctx.createOscillator();
        const oscGain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, t);
        osc.frequency.exponentialRampToValueAtTime(30, t + 0.3);
        oscGain.gain.setValueAtTime(0.3, t);
        oscGain.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
        osc.connect(oscGain);
        oscGain.connect(this.masterGain);
        osc.start(t);
        osc.stop(t + 0.4);
      },

      // Synthesize mother bird warning/damage
      playMotherHit() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.linearRampToValueAtTime(80, t + 0.3);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(t);
        osc.stop(t + 0.35);
      },

      // Synthesize combo power-up sound
      playCombo(count) {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const baseFreq = 400 + (count * 80);
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(baseFreq, t);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + 0.1);
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(t);
        osc.stop(t + 0.15);
      },

      // Synthesize level up fanfare
      playLevelUp() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
        notes.forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t + i * 0.12);
          gain.gain.linearRampToValueAtTime(0.3, t + i * 0.12 + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.12 + 0.4);
          osc.connect(gain);
          gain.connect(this.masterGain);
          osc.start(t + i * 0.12);
          osc.stop(t + i * 0.12 + 0.5);
        });
      },

      // Synthesize slingshot stretch tension
      playStretch() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(80, t + 0.08);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start(t);
        osc.stop(t + 0.08);
      },

      // Rainbow bird magical sound
      playRainbowHit() {
        if (!this.enabled || !this.ctx) return;
        this.resume();
        const t = this.ctx.currentTime;
        [440, 554, 659, 880].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t + i * 0.06);
          gain.gain.linearRampToValueAtTime(0.2, t + i * 0.06 + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.06 + 0.2);
          osc.connect(gain);
          gain.connect(this.masterGain);
          osc.start(t + i * 0.06);
          osc.stop(t + i * 0.06 + 0.25);
        });
      }
    };

    // ===== SCREEN SHAKE ENGINE =====
    const ScreenShake = {
      intensity: 0,
      duration: 0,
      offsetX: 0,
      offsetY: 0,

      shake(intensity, duration) {
        this.intensity = intensity;
        this.duration = duration;
      },

      update() {
        if (this.duration > 0) {
          this.offsetX = (Math.random() - 0.5) * this.intensity;
          this.offsetY = (Math.random() - 0.5) * this.intensity;
          this.intensity *= 0.9;
          this.duration--;
        } else {
          this.offsetX = 0;
          this.offsetY = 0;
        }
      }
    };

    // ===== SCREEN FLASH ENGINE =====
    const ScreenFlash = {
      flash(colorClass, duration) {
        const el = document.getElementById('screenFlash');
        el.className = 'screen-flash ' + colorClass + ' show';
        setTimeout(() => { el.classList.remove('show'); }, duration);
      }
    };

    // ===== COMBO DISPLAY ENGINE =====
    const ComboDisplay = {
      show(count) {
        const el = document.getElementById('comboDisplay');
        const num = document.getElementById('comboNumber');
        num.textContent = 'x' + count;
        el.classList.add('show');
        setTimeout(() => { el.classList.remove('show'); }, 800);
      }
    };

    // ===== STATE =====
    let coins = 0;
    let level = 1;
    let totalEarned = 0;
    let gameActive = true;
    let comboCount = 0;
    let lastHitTime = 0;
    const COMBO_WINDOW = 2000;
    const MAX_COMBO = 10;
    const BASE_BIRD_COUNT = 10;

    // Coin economics
    const TOTAL_SUPPLY = 10000000000;
    const EGGZ_MINT = "8Bdkub6HZ8fYUW9D3CjjzVsYR3M2Uv5Yad12V5LSpump";
    let currentPriceUSD = 0.0055;
    let currentMarketCapUSD = 55000000;
    let currentZARRate = 18.20;

    function getLevelThreshold(lvl) { return lvl * 1000; }
    function getBirdCountForLevel(lvl) { return BASE_BIRD_COUNT + Math.floor((lvl - 1) * 1.5); }
    function getBirdSpeedMultiplier(lvl) { return 1 + (lvl - 1) * 0.15; }

    function showNotification(msg) {
      var n = document.getElementById('notification');
      if (!n) return;
      n.textContent = msg;
      n.classList.add('show');
      setTimeout(function() { n.classList.remove('show'); }, 4000);
    }

    function showLevelUp(newLevel) {
      var n = document.getElementById('levelUpNotification');
      var t = document.getElementById('levelUpText');
      if (!n || !t) return;
      t.textContent = 'Level ' + newLevel + ' Unlocked! Birds getting faster...';
      n.classList.add('show');
      setTimeout(function() { n.classList.remove('show'); }, 2500);
    }

    // ===== LOAD & SAVE =====
    function loadLocalData() {
      coins = parseInt(localStorage.getItem('chickenEmpire_v1.eggs')) || 0;
      level = parseInt(localStorage.getItem('chickenEmpire_v1.level')) || 1;
      totalEarned = parseInt(localStorage.getItem('chickenEmpire_v1.totalEarned')) || 0;
      updateHUD();
      updateCoinInfo();
    }

    function saveLocalData() {
      localStorage.setItem('chickenEmpire_v1.eggs', coins);
      localStorage.setItem('chickenEmpire_v1.level', level);
      localStorage.setItem('chickenEmpire_v1.totalEarned', totalEarned);
    }

    // ===== HUD =====
    function updateHUD() {
      var lvl = document.getElementById('level-display');
      var next = document.getElementById('next-level');
      if (lvl) lvl.textContent = level;
      if (next) next.textContent = Math.max(0, getLevelThreshold(level) - totalEarned);
      saveLocalData();
    }

    // ===== PUMP.FUN STYLE COIN INFO UPDATE =====
    function formatCompact(num) {
      if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return num.toFixed(2);
    }

    function updateCoinInfo() {
      var priceEl = document.getElementById('coinPrice');
      var capEl = document.getElementById('coinCap');
      if (!priceEl || !capEl) return;
      var priceZAR = currentPriceUSD * currentZARRate;
      var mcapZAR = currentMarketCapUSD * currentZARRate;
      priceEl.innerHTML = '$' + currentPriceUSD.toFixed(4) + ' <span class="coin-divider">|</span> R' + priceZAR.toFixed(2);
      capEl.innerHTML = 'MCap: $' + formatCompact(currentMarketCapUSD) + ' <span class="coin-divider">|</span> R' + formatCompact(mcapZAR);
    }

    async function fetchZARRate() {
      try {
        var res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        var data = await res.json();
        currentZARRate = data.rates.ZAR || 18.20;
        return currentZARRate;
      } catch (e) {
        return currentZARRate;
      }
    }

    async function fetchLiveCoinData() {
      try {
        var pfRes = await fetch('https://frontend-api.pump.fun/coins/' + EGGZ_MINT);
        if (!pfRes.ok) throw new Error('Pump.fun API failed');
        var pfData = await pfRes.json();
        currentMarketCapUSD = pfData.usd_market_cap || 0;

    // ===== CANVAS =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameArea = document.getElementById('gameArea');
    const slingshot = { x: 0, y: 0, baseRadius: 35, elasticX: 0, elasticY: 0, isDragging: false, maxPull: 90 };
    const birds = [];
    const projectiles = [];
    const particles = [];
    const floatingTexts = [];
    const shockwaves = [];
    const projectileTrails = [];

    function resizeCanvas() {
      if (!gameArea) return;
      canvas.width = gameArea.clientWidth;
      canvas.height = gameArea.clientHeight;
      slingshot.x = canvas.width / 2;
      slingshot.y = canvas.height - 85;

    }
    window.addEventListener('resize', resizeCanvas);

    class Bird {
      constructor(isMother) {
        this.isMother = isMother;
        this.type = isMother ? 'mother' : 'normal';
        this.color = isMother ? '#2E8B57' : '#00d2ff';
        this.reset();
      }
      getRandomNormalColor() {
        var rand = Math.random();
        if (rand < 0.33) return '#FFAA00';
        if (rand < 0.66) return '#00FFFF';
        return '#FF00AA';
      }
      reset() {
        if (!this.isMother) {
          var r = Math.random();
          if (r < 0.03) { this.type = 'bomb'; this.color = '#FF0033'; }
          else if (r < 0.08) { this.type = 'golden'; this.color = '#FFE600'; }
          else if (r < 0.16) { this.type = 'rainbow'; this.color = 'rainbow'; }
          else { this.type = 'normal'; this.color = this.getRandomNormalColor(); }
        } else { this.type = 'mother'; this.color = '#4169E1'; }
        this.radius = this.isMother ? 38 : (this.type === 'golden' ? 22 : (this.type === 'bomb' ? 20 : 16));
        this.speed = this.isMother ? (Math.random() * 0.8 + 0.6) : (Math.random() * 2 + 1.5) * getBirdSpeedMultiplier(level);
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.x = this.direction === 1 ? -this.radius - Math.random() * 200 : canvas.width + this.radius + Math.random() * 200;
        this.y = this.isMother ? (canvas.height * 0.25) + Math.random() * 80 : (canvas.height * 0.08) + Math.random() * 160;
        this.wingWave = Math.random() * Math.PI;
        this.wingSpeed = this.isMother ? 0.08 : 0.25;
        this.blinkTimer = Math.random() * 100 + 50;
        this.pulseTimer = 0;
      }
      update() {
        this.x += this.speed * this.direction;
        this.wingWave += this.wingSpeed;
        this.blinkTimer--;
        this.pulseTimer += 0.05;
        if (this.blinkTimer <= 0) this.blinkTimer = Math.random() * 200 + 100;
        if (this.direction === 1 && this.x > canvas.width + this.radius) this.reset();
        if (this.direction === -1 && this.x < -this.radius) this.reset();
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.direction === -1) ctx.scale(-1, 1);
        var flap = Math.sin(this.wingWave);
        let fillStyle = this.color;
        if (this.type === 'rainbow') {
          let gradient = ctx.createLinearGradient(-this.radius, 0, this.radius, 0);
          gradient.addColorStop(0.0, '#FF0000'); gradient.addColorStop(0.2, '#FF7F00'); gradient.addColorStop(0.4, '#FFFF00');
          gradient.addColorStop(0.6, '#00FF00'); gradient.addColorStop(0.8, '#0000FF'); gradient.addColorStop(1.0, '#8B00FF');
          fillStyle = gradient;
        }
        // Glow effect for special birds
        if (this.type === 'golden' || this.type === 'bomb' || this.type === 'rainbow') {
          ctx.shadowColor = this.type === 'bomb' ? '#FF0033' : (this.type === 'golden' ? '#FFE600' : '#ff00ff');
          ctx.shadowBlur = 15 + Math.sin(this.pulseTimer * 3) * 5;
        }
        ctx.fillStyle = fillStyle; ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.ellipse(-5, flap * 5, this.radius * 0.8, this.radius * 1.3, (flap * 25 * Math.PI) / 180, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1.0;
        ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.fillStyle = fillStyle; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.radius * 0.35, -this.radius * 0.25, this.radius * 0.18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.radius * 0.4, -this.radius * 0.3, this.radius * 0.07, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.moveTo(this.radius * 0.8, -this.radius * 0.1); ctx.lineTo(this.radius * 1.3, this.radius * 0.05); ctx.lineTo(this.radius * 0.7, this.radius * 0.3); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    class Projectile {
      constructor(sx, sy, tx, ty) {
        this.x = sx; this.y = sy;
        var angle = Math.atan2(ty - sy, tx - sx);
        this.vx = Math.cos(angle) * 14; this.vy = Math.sin(angle) * 14;
        this.radius = 6; this.active = true;
        this.trail = [];
      }
      update() {
        // Store trail positions
        this.trail.push({ x: this.x, y: this.y, alpha: 1 });
        if (this.trail.length > 12) this.trail.shift();
        this.trail.forEach((t, i) => { t.alpha = i / this.trail.length; });
        this.x += this.vx; this.y += this.vy;
        if (this.y < -20 || this.x < -20 || this.x > canvas.width + 20) this.active = false;
      }
      draw() {
        // Draw trail
        for (let i = 0; i < this.trail.length; i++) {
          const t = this.trail[i];
          ctx.save();
          ctx.globalAlpha = t.alpha * 0.4;
          ctx.fillStyle = '#00f2fe';
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.radius * (t.alpha * 0.8), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        // Draw projectile
        ctx.save();
        ctx.shadowColor = '#00f2fe';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, color, speed, size) {
        this.x = x; this.y = y;
        this.color = color === 'rainbow' ? '#ff00ff' : color;
        var a = Math.random() * Math.PI * 2;
        var s = speed || (Math.random() * 4 + 1);
        this.vx = Math.cos(a) * s;
        this.vy = Math.sin(a) * s;
        this.alpha = 1;
        this.decay = 0.015 + Math.random() * 0.01;
        this.size = size || (2 + Math.random() * 2);
        this.gravity = 0.05;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.alpha -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    class Shockwave {
      constructor(x, y, color, maxRadius) {
        this.x = x; this.y = y;
        this.color = color;
        this.radius = 5;
        this.maxRadius = maxRadius || 80;
        this.alpha = 1;
        this.speed = 4;
      }
      update() {
        this.radius += this.speed;
        this.alpha = 1 - (this.radius / this.maxRadius);
      }
      draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.5;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    class FloatingText {
      constructor(x, y, text, color, size) {
        this.x = x; this.y = y;
        this.text = text;
        this.color = color === 'rainbow' ? '#ff00ff' : color;
        this.alpha = 1;
        this.vy = -1.5;
        this.vx = (Math.random() - 0.5) * 1;
        this.size = size || 18;
        this.scale = 0.5;
        this.targetScale = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.01;
        if (this.scale < this.targetScale) this.scale += 0.05;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.font = 'bold ' + this.size + 'px Orbitron';
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;
        ctx.textAlign = 'center';
        ctx.translate(this.x, this.y);
        ctx.scale(this.scale, this.scale);
        ctx.fillText(this.text, 0, 0);
        ctx.restore();
      }
    }

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var cx = e.touches ? e.touches[0].clientX : e.clientX;
      var cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
    }

    function onStart(e) {
      if (!gameActive) return;
      AudioEngine.init();
      var pos = getPos(e);
      if (Math.hypot(pos.x - slingshot.x, pos.y - slingshot.y) < slingshot.baseRadius + 30) {
        slingshot.isDragging = true;
        AudioEngine.playStretch();
      }
    }

    function onMove(e) {
      if (!slingshot.isDragging || !gameActive) return;
      if (e.type === 'touchmove') e.preventDefault();
      var pos = getPos(e);
      var dx = pos.x - slingshot.x;
      var dy = pos.y - slingshot.y;
      var dist = Math.hypot(dx, dy);
      if (dist > slingshot.maxPull) {
        var angle = Math.atan2(dy, dx);
        slingshot.elasticX = slingshot.x + Math.cos(angle) * slingshot.maxPull;
        slingshot.elasticY = slingshot.y + Math.sin(angle) * slingshot.maxPull;
      } else {
        slingshot.elasticX = pos.x;
        slingshot.elasticY = pos.y;
      }
    }

    function onEnd() {
      if (!slingshot.isDragging || !gameActive) return;
      slingshot.isDragging = false;
      var dx = slingshot.x - slingshot.elasticX;
      var dy = slingshot.y - slingshot.elasticY;
      if (Math.hypot(dx, dy) > 10) {
        AudioEngine.playLaunch();
        projectiles.push(new Projectile(slingshot.x, slingshot.y, slingshot.x + dx * 3, slingshot.y + dy * 3));
      }
      slingshot.elasticX = slingshot.x;
      slingshot.elasticY = slingshot.y;
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    window.addEventListener('touchmove', onMove, { passive: false });

    function handleHit(bird) {

            particles.push(new Particle(bird.x, bird.y, colors[Math.floor(Math.random() * colors.length)], Math.random() * 4 + 2));
          }
        }
        else if (bird.type === 'bomb') {

            particles.push(new Particle(bird.x, bird.y, '#ff8800', Math.random() * 6 + 2, Math.random() * 3 + 1));
          }
        }
        else {
          rewardAmount = comboMultiplier;
          rewardText = (comboCount > 1 ? 'x' + comboMultiplier + ' ' : '+') + rewardAmount + ' (+R' + (rewardAmount * 0.10).toFixed(2) + ')';
          rewardColor = bird.color === 'rainbow' ? '#ff00ff' : bird.color;
          AudioEngine.playHit(500 + comboMultiplier * 50);
          if (comboCount > 1) {
            AudioEngine.playCombo(comboCount);

          }

          for (var k = 0; k < 12 + comboCount * 2; k++) {
            particles.push(new Particle(bird.x, bird.y, rewardColor, Math.random() * 3 + 1));
          }
        }
        coins += rewardAmount;
        if (rewardAmount > 0) totalEarned += rewardAmount;
      }

      updateHUD();

      floatingTexts.push(new FloatingText(bird.x, bird.y, rewardText, rewardColor, comboCount > 3 ? 24 : 18));
      if (comboCount > 1 && !bird.isMother && bird.type !== 'bomb') {
        floatingTexts.push(new FloatingText(bird.x, bird.y - 35, 'COMBO x' + comboCount + '!', '#00f2fe', 16));

    function checkLevelUp() {
      var prevLevel = level;
      while (totalEarned >= getLevelThreshold(level)) { level++; }
      if (level > prevLevel) {
        showLevelUp(level);
        AudioEngine.playLevelUp();
        ScreenFlash.flash('cyan', 500);
        ScreenShake.shake(8, 15);
        var targetCount = getBirdCountForLevel(level);
        while (birds.length < targetCount) { birds.push(new Bird(false)); }
        birds.forEach(function(b) { if (!b.isMother) { b.speed = (Math.random() * 2 + 1.5) * getBirdSpeedMultiplier(level); } });
      }
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      // Apply screen shake
      ScreenShake.update();
      ctx.save();
      ctx.translate(ScreenShake.offsetX, ScreenShake.offsetY);

      ctx.clearRect(-50, -50, canvas.width + 100, canvas.height + 100);

      if (gameActive) {
        birds.forEach(function(b) { b.update(); });
        for (var i = projectiles.length - 1; i >= 0; i--) {
          var p = projectiles[i]; p.update();
          if (!p.active) { projectiles.splice(i, 1); continue; }
          for (var j = 0; j < birds.length; j++) {
            var b = birds[j];
            if (Math.hypot(p.x - b.x, p.y - b.y) < b.radius + p.radius) { p.active = false; projectiles.splice(i, 1); handleHit(b); break; }
          }
        }
        for (var i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].alpha <= 0) particles.splice(i, 1); }
        for (var i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(); if (floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1); }
        for (var i = shockwaves.length - 1; i >= 0; i--) { shockwaves[i].update(); if (shockwaves[i].alpha <= 0) shockwaves.splice(i, 1); }
      }

      // ===== 3D FUTURISTIC SLINGSHOT =====
      ctx.save();
      const sx = slingshot.x;
      const sy = slingshot.y;
      const baseTopWidth = 60;
      const baseBottomWidth = 24;
      const leftForkX = sx - 35;
      const rightForkX = sx + 35;
      const forkY = sy - 15;

      let baseGrad = ctx.createLinearGradient(sx - baseTopWidth, sy, sx + baseTopWidth, canvas.height);
      baseGrad.addColorStop(0, '#111827');
      baseGrad.addColorStop(0.3, '#374151');
      baseGrad.addColorStop(0.5, '#4b5563');
      baseGrad.addColorStop(0.7, '#1f2937');
      baseGrad.addColorStop(1, '#030712');
      ctx.fillStyle = baseGrad;
      ctx.beginPath();
      ctx.moveTo(sx - baseTopWidth / 2, sy + 25);
      ctx.lineTo(sx + baseTopWidth / 2, sy + 25);
      ctx.lineTo(sx + baseBottomWidth, canvas.height);
      ctx.lineTo(sx - baseBottomWidth, canvas.height);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = 'rgba(0, 242, 254, 0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx - 4, sy + 30);
      ctx.lineTo(sx - 2, canvas.height);
      ctx.moveTo(sx + 4, sy + 30);
      ctx.lineTo(sx + 2, canvas.height);
      ctx.stroke();

      let prongGradL = ctx.createLinearGradient(leftForkX, forkY, sx, sy + 25);
      prongGradL.addColorStop(0, '#4b5563');
      prongGradL.addColorStop(0.5, '#1f2937');
      prongGradL.addColorStop(1, '#111827');
      ctx.fillStyle = prongGradL;
      ctx.beginPath();
      ctx.moveTo(leftForkX - 8, forkY);
      ctx.lineTo(leftForkX + 8, forkY + 5);
      ctx.lineTo(sx, sy + 25);
      ctx.lineTo(sx - 12, sy + 25);
      ctx.closePath();
      ctx.fill();

      let prongGradR = ctx.createLinearGradient(sx, sy + 25, rightForkX, forkY);
      prongGradR.addColorStop(0, '#111827');
      prongGradR.addColorStop(0.5, '#1f2937');
      prongGradR.addColorStop(1, '#4b5563');
      ctx.fillStyle = prongGradR;
      ctx.beginPath();
      ctx.moveTo(sx, sy + 25);
      ctx.lineTo(rightForkX - 8, forkY + 5);
      ctx.lineTo(rightForkX + 8, forkY);
      ctx.lineTo(sx + 12, sy + 25);
      ctx.closePath();
      ctx.fill();

      ctx.shadowColor = '#00f2fe';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#00f2fe';
      ctx.beginPath();
      ctx.arc(leftForkX, forkY, 6, 0, Math.PI * 2);
      ctx.arc(rightForkX, forkY, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (slingshot.isDragging) {
        ctx.strokeStyle = 'rgba(0, 242, 254, 0.8)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(leftForkX, forkY);
        ctx.lineTo(slingshot.elasticX, slingshot.elasticY);
        ctx.moveTo(rightForkX, forkY);
        ctx.lineTo(slingshot.elasticX, slingshot.elasticY);
        ctx.stroke();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(leftForkX, forkY);
        ctx.lineTo(slingshot.elasticX, slingshot.elasticY);
        ctx.moveTo(rightForkX, forkY);
        ctx.lineTo(slingshot.elasticX, slingshot.elasticY);
        ctx.stroke();
      } else {
        ctx.strokeStyle = 'rgba(0, 242, 254, 0.15)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(leftForkX, forkY);
        ctx.lineTo(rightForkX, forkY);
        ctx.stroke();
      }

      ctx.shadowColor = '#00f2fe';
      ctx.shadowBlur = slingshot.isDragging ? 25 : 12;
      let projectileShade = ctx.createRadialGradient(
        slingshot.elasticX - 3, slingshot.elasticY - 3, 2,
        slingshot.elasticX, slingshot.elasticY, 14
      );
      projectileShade.addColorStop(0, '#ffffff');
      projectileShade.addColorStop(0.2, '#00f2fe');
      projectileShade.addColorStop(0.8, '#006699');
      projectileShade.addColorStop(1, '#002244');
      ctx.fillStyle = projectileShade;
      ctx.beginPath();
      ctx.arc(slingshot.elasticX, slingshot.elasticY, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(slingshot.elasticX, slingshot.elasticY, 16, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      // ===== END SLINGSHOT =====

      // Render effects (behind birds)
      shockwaves.forEach(function(s) { s.draw(); });
      particles.forEach(function(p) { p.draw(); });

      birds.forEach(function(b) { b.draw(); });
      projectiles.forEach(function(p) { p.draw(); });
      floatingTexts.forEach(function(t) { t.draw(); });

      ctx.restore();
    }

    // ===== SOUND TOGGLE =====
    const soundToggle = document.getElementById('soundToggle');
    soundToggle.addEventListener('click', () => {
      AudioEngine.init();
      AudioEngine.enabled = !AudioEngine.enabled;
      soundToggle.textContent = AudioEngine.enabled ? '🔊' : '🔇';
      soundToggle.classList.toggle('muted', !AudioEngine.enabled);
    });

    function init() {
      resizeCanvas();
      loadLocalData();
      birds.push(new Bird(true));
      var targetCount = getBirdCountForLevel(level);
      for (var i = 0; i < targetCount; i++) { birds.push(new Bird(false)); }
      updateHUD();
      fetchLiveCoinData();
      setInterval(fetchLiveCoinData, 30000);
      requestAnimationFrame(gameLoop);
    }
    init();
  </script>
</body>
  </html>
