<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Chicken Eggz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #0a0f1e; color: #fff; }
    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .bg-layer img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .page-wrapper { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
    .login-card { background: rgba(10, 20, 50, 0.95); border: 2px solid #FFD700; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.15); }
    .logo { font-family: 'Fredoka One', cursive; color: #fff; text-shadow: 0 0 20px #00aaff; font-size: 28px; text-align: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-family: 'Orbitron', sans-serif; font-size: 11px; color: #a0b0d0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .form-input { width: 100%; padding: 12px 14px; background: rgba(10, 15, 30, 0.8); border: 2px solid rgba(255, 215, 0, 0.2); border-radius: 10px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 14px; outline: none; transition: all 0.3s ease; }
    .form-input:focus { border-color: #FFD700; }
    .form-input::placeholder { color: #5a6a8a; }
    .action-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; margin-bottom: 10px; }
    .btn-primary { background: linear-gradient(135deg, #00aaff, #0077cc); color: #fff; box-shadow: 0 4px 15px rgba(0, 170, 255, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0, 170, 255, 0.5); }
    .btn-secondary { background: rgba(20, 30, 60, 0.8); border: 2px solid rgba(255, 215, 0, 0.3); color: #FFD700; }
    .btn-secondary:hover { border-color: #FFD700; background: rgba(255, 215, 0, 0.1); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .notification { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(239, 68, 68, 0.95); padding: 14px 28px; border-radius: 12px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 10000; font-size: 14px; max-width: 90vw; text-align: center; font-family: 'Poppins', sans-serif; border: 2px solid rgba(255, 255, 255, 0.3); }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .notification.success { background: rgba(34, 197, 94, 0.95); }
    .notification.info { background: rgba(59, 130, 246, 0.95); }
    .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px; border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 10px; background: rgba(20, 30, 60, 0.8); color: #a0b0d0; font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
    .tab-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
    .panel { display: none; }
    .panel.active { display: block; }
    .divider { text-align: center; margin: 16px 0; color: #5a6a8a; font-size: 12px; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(255, 215, 0, 0.2); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>
  <div class="bg-layer"><img src="Green.png" alt="Green Background"></div>
  <div class="page-wrapper">
    <div class="login-card">
      <div class="logo">🐔 Chicken Eggz</div>
      <div class="tab-nav">
        <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
        <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
      </div>

      <div id="loginPanel" class="panel active">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@email.com" value="admin@chicken.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="Enter password" value="admin2026">
        </div>
        <button class="action-btn btn-primary" id="loginBtn" onclick="doLogin()">LOGIN</button>
      </div>

      <div id="registerPanel" class="panel">
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input type="text" class="form-input" id="regName" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="regEmail" placeholder="you@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters">
        </div>
        <button class="action-btn btn-primary" id="regBtn" onclick="doRegister()">CREATE ACCOUNT</button>
      </div>

      <div class="divider">OR</div>
      <button class="action-btn btn-secondary" onclick="guestLogin()">PLAY AS GUEST</button>
    </div>
  </div>
  <div id="notification" class="notification" role="alert"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBleBA1kmdnkQxGlOOCEhP7gPMUJ-q3Hkg",
      authDomain: "chickeneggz.firebaseapp.com",
      projectId: "chickeneggz",
      storageBucket: "chickeneggz.firebasestorage.app",
      messagingSenderId: "378281633320",
      appId: "1:378281633320:web:2b6d668d3631e031a5f71d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = 'admin@chicken.com';
    let isRedirecting = false;

    function showNotification(msg, type = 'error') {
      const notif = document.getElementById('notification');
      notif.textContent = msg;
      notif.className = 'notification ' + type;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 5000);
    }

    async function checkIsAdmin(user) {
      if (!user) return false;
      if (user.email && user.email.toLowerCase() === ADMIN_EMAIL) return true;
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().isAdmin === true) return true;
      } catch (e) { console.warn('Firestore admin check failed:', e); }
      return false;
    }

    function redirectByRole(isAdmin) {
      if (isRedirecting) return;
      isRedirecting = true;
      if (isAdmin) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'game.html';
      }
    }

    function resetLoginBtn() {
      const btn = document.getElementById('loginBtn');
      if (btn) { btn.disabled = false; btn.innerHTML = 'LOGIN'; }
    }

    window.showTab = function(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      if (tab === 'login') { document.getElementById('loginTab').classList.add('active'); document.getElementById('loginPanel').classList.add('active'); }
      else { document.getElementById('registerTab').classList.add('active'); document.getElementById('registerPanel').classList.add('active'); }
    };

    window.doLogin = async function() {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        showNotification('Please enter email and password');
        resetLoginBtn();
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'LOGGING IN... <span class="loading-spinner"></span>';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const isAdmin = await checkIsAdmin(cred.user);

        if (isAdmin) {
          showNotification('Welcome Admin! 🛡️', 'success');
        } else {
          showNotification('Welcome back! 🐔', 'success');
        }

        setTimeout(() => redirectByRole(isAdmin), 800);
      } catch (e) {
        console.error('Login error:', e);
        showNotification(e.message || 'Login failed');
        resetLoginBtn();
      }
    };

    window.doRegister = async function() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim().toLowerCase();
      const password = document.getElementById('regPassword').value;
      const btn = document.getElementById('regBtn');

      if (!name || !email || !password) { showNotification('Please fill all fields'); return; }
      if (password.length < 6) { showNotification('Password must be at least 6 characters'); return; }
      if (email === ADMIN_EMAIL) { showNotification('This email is reserved'); return; }

      btn.disabled = true;
      btn.innerHTML = 'CREATING... <span class="loading-spinner"></span>';

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db, 'users', cred.user.uid), {
          uid: cred.user.uid,
          email: email,
          name: name,
          eggs: 0,
          level: 1,
          totalEarned: 0,
          isAdmin: false,
          isBlocked: false,
          createdAt: serverTimestamp()
        });
        showNotification('Account created! 🐔', 'success');
        setTimeout(() => window.location.href = 'game.html', 1000);
      } catch (e) {
        showNotification(e.message || 'Registration failed');
        btn.disabled = false;
        btn.innerHTML = 'CREATE ACCOUNT';
      }
    };

    window.guestLogin = function() {
      localStorage.setItem('chickenEmpire_v1.guest', 'true');
      showNotification('Guest mode — data is local only', 'info');
      setTimeout(() => window.location.href = 'game.html', 1000);
    };

    // === AUTO-REDIRECT ON PAGE LOAD ===
    // Only redirect if already logged in — do NOT interfere with manual login
    onAuthStateChanged(auth, async (user) => {
      if (user && !localStorage.getItem('chickenEmpire_v1.guest')) {
        // User is already logged in from a previous session
        const isAdmin = await checkIsAdmin(user);
        redirectByRole(isAdmin);
      }
      // If no user, stay on login page — button is ready to press
    });
  </script>
</body>
    </html>
