<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Chicken Eggz</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Poppins', system-ui, sans-serif;
      background-color: #0a0f1e;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }

    .bg-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }
    .bg-layer img {
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    .bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(10, 15, 30, 0.85);
      z-index: 1;
    }

    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(20, 30, 60, 0.95);
      border: 2px solid #FFD700;
      border-radius: 16px;
      padding: 30px 24px;
      max-width: 360px;
      width: 90%;
      margin: auto;
      text-align: center;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
    }

    .login-title {
      font-family: 'Fredoka One', cursive;
      font-size: 28px;
      color: #FFD700;
      margin-bottom: 4px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .login-subtitle {
      color: #a0b0d0;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 14px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 10px;
      color: #a0b0d0;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(10, 15, 30, 0.8);
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 10px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .form-input:focus {
      border-color: #FFD700;
    }
    .form-input::placeholder { color: #555; }

    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #0a0f1e;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    }
    .login-btn:hover {
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
      transform: translateY(-1px);
    }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 10px;
      min-height: 18px;
    }

    .login-links {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
    }
    .login-links a {
      color: #FFD700;
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-links a:hover { color: #fff; }

    .version-meta {
      color: #444;
      font-size: 9px;
      text-align: center;
      margin-top: 16px;
    }

    .loading-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .firestore-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-family: 'Orbitron', sans-serif;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .firestore-badge.online {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .firestore-badge.offline {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
  </style>
</head>
<body>

  <div class="bg-layer">
    <img src="Green.png" alt="Green Background">
  </div>
  <div class="bg-overlay"></div>

  <div class="login-card">
    <div class="login-title">🐔 Chicken Eggz</div>
    <div class="login-subtitle">Login to your account</div>

    <div class="loading-spinner" id="loadingSpinner"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="Enter your email" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">🔐 LOGIN</button>
    <div class="login-error" id="loginError"></div>

    <div class="login-links">
      <a href="register.html">Create Account</a>
      <a href="forgot.html">Forgot Password?</a>
    </div>

    <div class="version-meta">
      v3.0 | Admin: admin@chicken.com
    </div>
    <div id="connectionBadge" class="firestore-badge offline">localStorage mode</div>
  </div>

  <script>
    // ============================================================
    //  FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBleBA1kmdnkQxGlOOCEhP7gPMUJ-q3Hkg",
      authDomain: "chickeneggz.firebaseapp.com",
      projectId: "chickeneggz",
      storageBucket: "chickeneggz.firebasestorage.app",
      messagingSenderId: "378281633320",
      appId: "1:378281633320:web:2b6d668d3631e031a5f71d"
    };

    const DB_KEYS = {
      SESSION: 'chickenAdmin_session',
      GAME_SESSION: 'chickenEmpire_v1.session'
    };

    const ADMIN_EMAIL = 'admin@chicken.com';
    const ADMIN_PASSWORD = 'admin2026';

    let db = null;
    let useFirestore = false;
    let authChecked = false;

    // ===== INIT =====
    function init() {
      try {
        if (typeof firebase !== 'undefined' && firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('YOUR')) {
          firebase.initializeApp(firebaseConfig);
          db = firebase.firestore();
          useFirestore = true;

          // Check auth state first before localStorage redirect
          firebase.auth().onAuthStateChanged(async (user) => {
            if (authChecked) return; // Prevent double handling
            authChecked = true;

            if (user) {
              try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().isAdmin) {
                  setStore(DB_KEYS.SESSION, { email: user.email, loggedInAt: new Date().toISOString() });
                  window.location.replace('admin_dashboard.html');
                  return;
                } else if (userDoc.exists) {
                  setStore(DB_KEYS.GAME_SESSION, {
                    uid: user.uid,
                    email: user.email,
                    name: userDoc.data().name || user.email,
                    loggedInAt: new Date().toISOString()
                  });
                  window.location.replace('game.html');
                  return;
                }
                // User exists in Auth but not in Firestore - sign them out
                await firebase.auth().signOut();
              } catch (e) {
                console.warn('Auth state check failed:', e);
              }
            }

            // Only check localStorage if Firebase auth didn't redirect
            checkLocalSession();
          });

          const badge = document.getElementById('connectionBadge');
          if (badge) {
            badge.textContent = 'Firestore Online';
            badge.className = 'firestore-badge online';
          }
        } else {
          // No Firebase - use localStorage only
          checkLocalSession();
        }
      } catch (e) {
        console.warn('Firebase init failed:', e);
        useFirestore = false;
        checkLocalSession();
      }

      // Enter key support
      document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
      });
    }

    function getStore(key) {
      try {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : null;
      } catch (e) { return null; }
    }
    function setStore(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function checkLocalSession() {
      const session = getStore(DB_KEYS.SESSION);
      if (session && session.email === ADMIN_EMAIL) {
        window.location.replace('admin_dashboard.html');
        return;
      }
      const gameSession = getStore(DB_KEYS.GAME_SESSION);
      if (gameSession && gameSession.email) {
        window.location.replace('game.html');
      }
    }

    function setLoading(isLoading) {
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loadingSpinner');
      const errorEl = document.getElementById('loginError');
      if (isLoading) {
        btn.disabled = true;
        btn.textContent = 'LOGGING IN...';
        spinner.style.display = 'block';
        errorEl.textContent = '';
      } else {
        btn.disabled = false;
        btn.textContent = '🔐 LOGIN';
        spinner.style.display = 'none';
      }
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');

      if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        return;
      }

      setLoading(true);
      errorEl.textContent = '';

      if (useFirestore && db) {
        try {
          const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
          const userDoc = await db.collection('users').doc(cred.user.uid).get();

          if (!userDoc.exists) {
            // No Firestore profile found
            await firebase.auth().signOut();
            setLoading(false);
            errorEl.textContent = 'User profile not found. Please register first.';
            return;
          }

          const userData = userDoc.data();

          if (userData.isAdmin) {
            setStore(DB_KEYS.SESSION, { email: email, loggedInAt: new Date().toISOString() });
            window.location.replace('admin_dashboard.html');
          } else {
            setStore(DB_KEYS.GAME_SESSION, {
              uid: cred.user.uid,
              email: email,
              name: userData.name || email,
              loggedInAt: new Date().toISOString()
            });
            window.location.replace('game.html');
          }
        } catch (err) {
          console.error('Login error:', err);

          // If admin account doesn't exist in Firebase Auth, create it
          if (err.code === 'auth/user-not-found' && email === ADMIN_EMAIL) {
            try {
              const newCred = await firebase.auth().createUserWithEmailAndPassword(email, password);
              await db.collection('users').doc(newCred.user.uid).set({
                uid: newCred.user.uid,
                name: 'Administrator',
                email: email,
                cellNumber: '0792840349',
                isAdmin: true,
                isBlocked: false,
                status: 'approved',
                eggs: 999999,
                isSystemAdmin: true,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              setStore(DB_KEYS.SESSION, { email: email, loggedInAt: new Date().toISOString() });
              window.location.replace('admin_dashboard.html');
              return;
            } catch (createErr) {
              console.error('Admin creation error:', createErr);
              setLoading(false);
              errorEl.textContent = getFriendlyError(createErr.code || createErr.message);
              return;
            }
          }

          setLoading(false);
          errorEl.textContent = getFriendlyError(err.code || err.message);
        }
      } else {
        // LocalStorage fallback mode
        setTimeout(() => {
          if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            setStore(DB_KEYS.SESSION, { email: email, loggedInAt: new Date().toISOString() });
            window.location.replace('admin_dashboard.html');
          } else {
            const users = getStore('chickenAdmin_users') || {};
            const userEntry = Object.entries(users).find(([uid, u]) => u.email === email && u.password === password);
            if (userEntry) {
              const [uid, user] = userEntry;
              setStore(DB_KEYS.GAME_SESSION, {
                uid: uid,
                email: email,
                name: user.name || email,
                loggedInAt: new Date().toISOString()
              });
              window.location.replace('game.html');
            } else {
              setLoading(false);
              errorEl.textContent = 'Invalid email or password.';
            }
          }
        }, 300);
      }
    }

    function getFriendlyError(code) {
      const errors = {
        'auth/invalid-email': 'Invalid email address.',
        'auth/user-disabled': 'This account has been disabled.',
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-credential': 'Invalid email or password.',
        'auth/too-many-requests': 'Too many failed attempts. Please try again later.',
        'auth/network-request-failed': 'Network error. Please check your connection.',
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/weak-password': 'Password is too weak.',
        'auth/invalid-api-key': 'Firebase configuration error.',
        'auth/app-deleted': 'Firebase app was deleted.',
        'auth/invalid-user-token': 'Invalid user token. Please login again.',
        'auth/user-token-expired': 'Session expired. Please login again.'
      };
      return errors[code] || ('Login failed: ' + code);
    }

    // ===== INIT =====
    init();
  </script>
</body>
</html>
