<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chicken Eggz - Portal Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap');
    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    html, body { 
      height: 100%; 
      width: 100%; 
      overflow: hidden; 
      font-family: 'Poppins', sans-serif; 
      background: #00aaff; 
      color:  #00aaff; 
      user-select: none;
      touch-action: none;
    }
    .space-matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      background: url('Green.png') no-repeat center center;
      background-size: cover;
    }
    .cloud-container { 
      position: fixed; 
      width: 100%; 
      height: 100%; 
      pointer-events: none; 
      z-index: 5; 
      overflow: hidden;
    }
    .cloud { 
      position: absolute; 
      background: #ffffff; 
      border-radius: 100px;
      box-shadow: 0 0 30px rgba(255,255,255,0.95), 0 0 60px rgba(255,255,255,0.4);
      animation: floatClouds linear infinite; 
      opacity: 1;
    }
    .cloud::before, .cloud::after { 
      content: ''; 
      position: absolute; 
      background: #ffffff; 
      border-radius: 50%; 
      box-shadow: 0 0 15px rgba(255,255,255,); 
    }
    .cloud.size-l { width: 100px; height: 35px; }
    .cloud.size-l::before { width: 50px; height: 50px; top: -28px; left: 15px; }
    .cloud.size-l::after { width: 38px; height: 38px; top: -18px; right: 15px; }
    .cloud.size-m { width: 70px; height: 25px; }
    .cloud.size-m::before { width: 35px; height: 35px; top: -20px; left: 10px; }
    .cloud.size-m::after { width: 28px; height: 28px; top: -14px; right: 10px; }
    .cloud.size-s { width: 45px; height: 16px; }
    .cloud.size-s::before { width: 22px; height: 22px; top: -12px; left: 7px; }
    .cloud.size-s::after { width: 17px; height: 17px; top: -8px; right: 7px; }
    @keyframes floatClouds { 
      0% { transform: translateX(-150px); } 
      100% { transform: translateX(100vw); } 
    }
    
    .portal-frame {
      position: relative;
      z-index: 100;
      display: flex;
      flex-direction: column;
      height: 70vh;
      width: 100vw;
      padding: 5px;
      justify-content: space-between;
      align-items: center;
    }
    header {
      width: 100%;
      max-width: 500px;
      text-align: center;
      margin-top: 30px;
      padding: 15px;
      background: transparent;
      border: 20px;
      border-radius: 0;
      box-shadow:  #00ff50;
    }
    .center-display {
      flex: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
    }
    .logo-sphere {
      position: relative;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, transparent 90%);
      display: flex;
      justify-content: center;
      align-items: center;
      animation: corePulse 4s ease-in-out infinite alternate;
    }
    .logo-img-asset {
      width: 350px;
      height: 350px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px ) drop-shadow(0 0 15px rgba(255, 255, 255, 1));
      animation: bounce 5s ease-in-out infinite alternate;
    }
    @keyframes corePulse {
      0% { transform: scale(0.95); opacity: 0.85; }
      100% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes bounce {
      0% { transform: translateY(-8px); }
      100% { transform: translateY(8px); }
    }
    .status-panel {
      margin-top: 250px;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
      font-size: 8px;
      letter-spacing: 2px;
      color:  #00f2fe;
      text-transform: uppercase;
      background: transparent;
      padding: 3px 8px;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 0, 1);
      text-shadow: 0 10px 50px #000000;
    }
    .nav-bot-futuristic {
      position: fixed;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 20px);
      max-width: 440px;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      z-index: 100;
      background: none;
      border: none;
      box-shadow: none;
    }
    .futuristic-btn-3d {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      background: none;
      border: none;
      outline: none;
      padding: 8px;
      gap: 4px;
      transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .glyph-3d {
      font-size: 24px;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 1));
      transition: all 0.25s ease;
    }
    .btn-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 6px;
      font-weight: 1000;
      letter-spacing: 1.5px;
      color:  #00f2fe;
      text-transform: uppercase;
      transition: all 0.25s ease;
      text-shadow: 0 5px 10px rgba(0, 0, 0, 0.8);
    }
    .futuristic-btn-3d:hover .glyph-3d {
      transform: scale(1.2) translateY(-6px);
    }
    .futuristic-btn-3d:hover .btn-label {
      color: #ffffff;
      transform: translateY(-2px);
    }
    .btn-reg:hover .glyph-3d { filter: drop-shadow(0 0 15px #000000); }
    .btn-reg:hover .btn-label { color: #000000; text-shadow: 0 0 8px #000000; }
    .btn-login:hover .glyph-3d { filter: drop-shadow(0 0 15px #000000); }
    .btn-login:hover .btn-label { color: #000000; text-shadow: 0 0 8px #ffffff; }
    .btn-chat:hover .glyph-3d { filter: drop-shadow(0 0 15px #22c55e); }
    .btn-chat:hover .btn-label { color: #22c55e; text-shadow: 0 0 8px #22c55e; }
    .btn-info:hover .glyph-3d { filter: drop-shadow(0 0 15px #00aaff); }
    .btn-info:hover .btn-label { color: #00aaff; text-shadow: 0 0 8px #00aaff; }
    .futuristic-btn-3d:active .glyph-3d {
      transform: scale(0.95) translateY(0);
    }
    .futuristic-btn-3d:active .btn-label {
      transform: translateY(0);
    }

    /* ===== PUMP.FUN STYLE COIN INFO (ORIGINAL FOOTER LOOK) ===== */
    .coin-info {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: #000000;
      backdrop-filter: blur(-10px);
      border: 2px solid rgba(255, 255, 0, 1);
      border-radius: 10px;
      padding: 5px 15px;
      text-align: center;
      pointer-events: none;
      box-shadow: 0 0 22px #000000;
      display: inline-block;
    }
    .coin-info .coin-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 900;
      color: #00ff50;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .coin-info .coin-price {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 900;
      color: rgba(255, 255, 0, 1);
      text-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
    }
    .coin-info .coin-cap {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 900;
      color: #00aaff;
      margin-top: 1px;
    }
    .coin-info .coin-divider {
      color: #4a5568;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <div class="space-matrix">
    <div class="grid-lines"></div>
  </div>
  <div class="cloud-container">
    <div class="cloud size-l" style="top: 5%; animation-duration: 22s; animation-delay: 0s;"></div>
    <div class="cloud size-m" style="top: 6%; animation-duration: 16s; animation-delay: -4s;"></div>
    <div class="cloud size-s" style="top: 2%; animation-duration: 12s; animation-delay: -2s;"></div>
    <div class="cloud size-l" style="top: 18%; animation-duration: 26s; animation-delay: -8s;"></div>
    <div class="cloud size-m" style="top: 19%; animation-duration: 19s; animation-delay: -5s;"></div>
  </div>
  <div class="portal-frame">
    <header></header>
    <div class="center-display">
      <div class="logo-sphere">
        <img src="Eggz.png" alt="Chicken Eggz Asset" class="logo-img-asset" />
      </div>
    <div class="coin-info" id="coinInfo">
      <div class="coin-name">EGGZ / USD · ZAR</div>
      <div class="coin-price" id="coinPrice">$0.0055 <span class="coin-divider">|</span> R0.10</div>
      <div class="coin-cap" id="coinCap">MCap: $55.0M <span class="coin-divider">|</span> R1.0B</div>
    </div>
    <nav class="nav-bot-futuristic" aria-label="Cybernetic Navigation Bar">
      <a href="reg.html" class="futuristic-btn-3d btn-reg" title="Register Network Access">
        <span class="glyph-3d">🐥</span>
        <span class="btn-label">Register</span>
      </a>
      <a href="login.html" class="futuristic-btn-3d btn-login" title="Secure Core Login">
        <span class="glyph-3d">🐣</span>
        <span class="btn-label">Login</span>
      </a>
      <a href="visitor.html" class="futuristic-btn-3d btn-info" title="Database Information Desk">
        <span class="glyph-3d">ℹ️</span>
        <span class="btn-label">Info</span>
      </a>
    </nav>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBleBA1kmdnkQxGlOOCEhP7gPMUJ-q3Hkg",
      authDomain: "chickeneggz.firebaseapp.com",
      projectId: "chickeneggz",
      storageBucket: "chickeneggz.appspot.com", 
      messagingSenderId: "378281633320",
      appId: "1:378281633320:web:2b6d668d3631e031a5f71d"
    };

    try {
      const app = initializeApp(firebaseConfig);
      console.log("🚀 Firebase Core Matrix Connected.");
    } catch (error) {
      console.error("❌ Core Portal Connection Interrupted:", error);
    }

    window.addEventListener('DOMContentLoaded', () => {
      const statusText = document.getElementById('system-status');
      const bootSequences = [
        "Welcome to Chicken Eggz",
        "Shoot your birds",
        "Earn Buy Sell // Cash Eggz Coins",
        "Eggz Coin Listed on Pump.fun"
      ];
      let index = 0;
      const sequenceInterval = setInterval(() => {
        if(index < bootSequences.length - 1) {
          statusText.textContent = bootSequences[index];
          index++;
        } else {
          statusText.textContent = bootSequences[bootSequences.length - 1];
          clearInterval(sequenceInterval);
        }
      }, 450);
    });

    // ==================== LIVE PUMP.FUN DATA ====================
    const EGGZ_MINT = "8Bdkub6HZ8fYUW9D3CjjzVsYR3M2Uv5Yad12V5LSpump";
    const TOTAL_SUPPLY = 10000000000;

    function formatCompact(num) {
      if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
      return num.toFixed(2);
    }

    async function fetchZARRate() {
      try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const data = await res.json();
        return data.rates.ZAR || 18.20;
      } catch (e) {
        return 18.20;
      }
    }

    async function fetchLiveCoinData() {
      try {
        const pfRes = await fetch(`https://frontend-api.pump.fun/coins/${EGGZ_MINT}`);
        if (!pfRes.ok) throw new Error('Pump.fun API failed');
        const pfData = await pfRes.json();

        const usdMarketCap = pfData.usd_market_cap || 0;
        const priceUSD = usdMarketCap > 0 ? (usdMarketCap / TOTAL_SUPPLY) : 0;

        const zarRate = await fetchZARRate();
        const priceZAR = priceUSD * zarRate;
        const mcapZAR = usdMarketCap * zarRate;

        const priceEl = document.getElementById('coinPrice');
        const capEl = document.getElementById('coinCap');
        if (priceEl) {
          priceEl.innerHTML = '$' + priceUSD.toFixed(4) + ' <span class="coin-divider">|</span> R' + priceZAR.toFixed(2);
        }
        if (capEl) {
          capEl.innerHTML = 'MCap: $' + formatCompact(usdMarketCap) + ' <span class="coin-divider">|</span> R' + formatCompact(mcapZAR);
        }
      } catch (err) {
        console.error('Live data fetch failed:', err);
        try {
          const dexRes = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${EGGZ_MINT}`);
          const dexData = await dexRes.json();
          const pair = dexData.pairs?.[0];
          if (pair) {
            const priceUSD = parseFloat(pair.priceUsd) || 0;
            const usdMarketCap = pair.marketCap ? parseFloat(pair.marketCap) : (priceUSD * TOTAL_SUPPLY);
            const zarRate = await fetchZARRate();
            const priceZAR = priceUSD * zarRate;
            const mcapZAR = usdMarketCap * zarRate;

            const priceEl = document.getElementById('coinPrice');
            const capEl = document.getElementById('coinCap');
            if (priceEl) {
              priceEl.innerHTML = '$' + priceUSD.toFixed(4) + ' <span class="coin-divider">|</span> R' + priceZAR.toFixed(2);
            }
            if (capEl) {
              capEl.innerHTML = 'MCap: $' + formatCompact(usdMarketCap) + ' <span class="coin-divider">|</span> R' + formatCompact(mcapZAR);
            }
          }
        } catch (dexErr) {
          console.error('DexScreener fallback also failed:', dexErr);
        }
      }
    }

    fetchLiveCoinData();
    setInterval(fetchLiveCoinData, 30000);
  </script>
</body>
</html>
