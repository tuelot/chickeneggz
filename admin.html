<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Admin - Chicken Eggz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Poppins', sans-serif; background: #0a0f1e; color: #fff; overflow: hidden; }
    body { display: flex; flex-direction: column; padding-bottom: 60px; }
    header { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 0, 125, 0.85); padding: 10px 15px; margin: 10px; border-radius: 12px; backdrop-filter: blur(10px); border: 3px solid #ffffff; box-shadow: 0 0 12px #FFFFFF; }
    header h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; }
    .admin-badge { background: #ff007d; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-family: 'Orbitron'; }
    .hud-container { flex: 1; min-height: 0; width: 100%; display: flex; flex-direction: column; padding: 0 10px 10px 10px; }
    .ice-textbox { flex: 1; min-height: 0; border: 3px solid #ffd700; border-radius: 16px; background: #000; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .tab-nav { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab-btn { padding: 8px 14px; border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 8px; background: rgba(20, 30, 60, 0.8); color: #a0b0d0; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
    .tab-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255, 215, 0, 0.1); }
    .panel { display: none; }
    .panel.active { display: block; }
    .stat-card { background: rgba(20, 30, 60, 0.8); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .stat-label { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #a0b0d0; text-transform: uppercase; }
    .stat-value { font-family: 'Orbitron', sans-serif; font-size: 20px; color: #FFD700; font-weight: 900; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .data-table th { background: rgba(255, 215, 0, 0.1); color: #FFD700; padding: 8px; text-align: left; font-family: 'Orbitron', sans-serif; font-size: 9px; text-transform: uppercase; border-bottom: 1px solid rgba(255, 215, 0, 0.3); }
    .data-table td { padding: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #c0d0f0; }
    .data-table tr:hover { background: rgba(255, 255, 255, 0.02); }
    .action-btn { padding: 4px 10px; border: none; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-size: 9px; cursor: pointer; text-transform: uppercase; color: #fff; margin-right: 4px; }
    .btn-approve { background: #22c55e; }
    .btn-reject { background: #ef4444; }
    .btn-block { background: #f97316; }
    .btn-unblock { background: #3b82f6; }
    .status-pending { color: #f59e0b; }
    .status-approved { color: #22c55e; }
    .status-rejected { color: #ef4444; }
    .notification { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(239, 68, 68, 0.95); padding: 10px 20px; border-radius: 10px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 10000; font-size: 12px; max-width: 90vw; text-align: center; font-family: 'Poppins', sans-serif; }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .notification.success { background: rgba(34, 197, 94, 0.95); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.95); border-top: 1px solid #ffd700; z-index: 1000; }
    .bottom-nav-btn { color: #fff; text-decoration: none; text-align: center; font-size: 10px; font-family: 'Orbitron'; padding: 5px 15px; border-radius: 8px; }
    .bottom-nav-btn:hover { background: rgba(255, 215, 0, 0.1); }
    .empty-state { text-align: center; padding: 40px; color: #555; font-size: 13px; }
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <h1>🛡️ ADMIN PANEL</h1>
  <span class="admin-badge">ADMIN</span>
</header>
<div class="hud-container">
  <div class="ice-textbox">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
      <button class="tab-btn" onclick="showTab('transactions')">💰 Transactions</button>
      <button class="tab-btn" onclick="showTab('users')">👥 Users</button>
      <button class="tab-btn" onclick="showTab('chat')">💬 Chat</button>
    </div>

    <div id="dashboardPanel" class="panel active">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="totalUsers">0</div></div>
        <div class="stat-card"><div class="stat-label">Total Eggz</div><div class="stat-value" id="totalEggs">0</div></div>
        <div class="stat-card"><div class="stat-label">Pending Tx</div><div class="stat-value" id="pendingTx">0</div></div>
        <div class="stat-card"><div class="stat-label">Total Messages</div><div class="stat-value" id="totalMessages">0</div></div>
      </div>
    </div>

    <div id="transactionsPanel" class="panel">
      <table class="data-table">
        <thead><tr><th>User</th><th>Type</th><th>Eggz</th><th>Rands</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody id="txTableBody"><tr><td colspan="7" class="empty-state">Loading...</td></tr></tbody>
      </table>
    </div>

    <div id="usersPanel" class="panel">
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Eggz</th><th>Level</th><th>Admin</th><th>Blocked</th><th>Actions</th></tr></thead>
        <tbody id="usersTableBody"><tr><td colspan="7" class="empty-state">Loading...</td></tr></tbody>
      </table>
    </div>

    <div id="chatPanel" class="panel">
      <table class="data-table">
        <thead><tr><th>User</th><th>Message</th><th>Channel</th><th>Time</th><th>Actions</th></tr></thead>
        <tbody id="chatTableBody"><tr><td colspan="5" class="empty-state">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<nav class="bottom-nav">
  <a href="game.html" class="bottom-nav-btn">🎮<br>GAME</a>
  <a href="chat.html" class="bottom-nav-btn">💬<br>CHAT</a>
  <a href="index.html" class="bottom-nav-btn">❌<br>EXIT</a>
</nav>
<div id="notification" class="notification" role="alert"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBleBA1kmdnkQxGlOOCEhP7gPMUJ-q3Hkg",
  authDomain: "chickeneggz.firebaseapp.com",
  projectId: "chickeneggz",
  storageBucket: "chickeneggz.firebasestorage.app",
  messagingSenderId: "378281633320",
  appId: "1:378281633320:web:2b6d668d3631e031a5f71d"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let isAdmin = false;
  let usersData = [];
  let txsData = [];
  let msgsData = [];

  function showNotification(msg, type = 'error') {
    const notif = document.getElementById('notification');
    notif.textContent = msg;
    notif.className = 'notification ' + type;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 4000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) { isAdmin = userDoc.data().isAdmin === true; }
    if (user.email === 'admin@chicken.com') isAdmin = true;
    if (!isAdmin) { showNotification('Access denied. Admins only.'); setTimeout(() => window.location.href = 'game.html', 2000); return; }
    loadDashboard();
    listenUsers();
    listenTransactions();
    listenMessages();
  });

  window.showTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab + 'Panel').classList.add('active');
  };

  function listenUsers() {
    onSnapshot(collection(db, 'users'), (snap) => {
      usersData = [];
      snap.forEach(d => usersData.push({ id: d.id, ...d.data() }));
      renderUsers();
      updateDashboard();
    });
  }

  function listenTransactions() {
    onSnapshot(query(collection(db, 'transactions'), orderBy('createdAt', 'desc')), (snap) => {
      txsData = [];
      snap.forEach(d => txsData.push({ id: d.id, ...d.data() }));
      renderTransactions();
      updateDashboard();
    });
  }

  function listenMessages() {
    onSnapshot(query(collection(db, 'messages'), orderBy('timestamp', 'desc')), (snap) => {
      msgsData = [];
      snap.forEach(d => msgsData.push({ id: d.id, ...d.data() }));
      renderMessages();
      updateDashboard();
    });
  }

  function updateDashboard() {
    document.getElementById('totalUsers').textContent = usersData.length;
    document.getElementById('totalEggs').textContent = usersData.reduce((sum, u) => sum + (u.eggs || 0), 0).toLocaleString();
    document.getElementById('pendingTx').textContent = txsData.filter(t => t.status === 'pending').length;
    document.getElementById('totalMessages').textContent = msgsData.length;
  }

  function renderUsers() {
    const tbody = document.getElementById('usersTableBody');
    if (usersData.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No users</td></tr>'; return; }
    tbody.innerHTML = usersData.map(u => {
      const blockBtn = u.isBlocked 
        ? `<button class="action-btn btn-unblock" onclick="unblockUser('${u.id}')">Unblock</button>`
        : `<button class="action-btn btn-block" onclick="blockUser('${u.id}')">Block</button>`;
      return `<tr><td>${u.name || 'N/A'}</td><td>${u.email || 'N/A'}</td><td>${u.eggs || 0}</td><td>${u.level || 1}</td><td>${u.isAdmin ? 'Yes' : 'No'}</td><td>${u.isBlocked ? 'Yes' : 'No'}</td><td>${blockBtn}</td></tr>`;
    }).join('');
  }

  function renderTransactions() {
    const tbody = document.getElementById('txTableBody');
    if (txsData.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No transactions</td></tr>'; return; }
    tbody.innerHTML = txsData.map(tx => {
      const date = tx.createdAt && tx.createdAt.toDate ? tx.createdAt.toDate().toLocaleDateString() : 'N/A';
      const statusClass = 'status-' + (tx.status || 'pending');
      let actions = '';
      if (tx.status === 'pending') {
        actions = `<button class="action-btn btn-approve" onclick="approveTx('${tx.id}', '${tx.userId}', ${tx.coinAmount || 0}, '${tx.type}')">Approve</button><button class="action-btn btn-reject" onclick="rejectTx('${tx.id}')">Reject</button>`;
      }
      return `<tr><td>${tx.userName || tx.userEmail || 'N/A'}</td><td>${tx.type}</td><td>${tx.coinAmount || 0}</td><td>R${tx.cost || 0}</td><td class="${statusClass}">${tx.status || 'pending'}</td><td>${date}</td><td>${actions}</td></tr>`;
    }).join('');
  }

  function renderMessages() {
    const tbody = document.getElementById('chatTableBody');
    if (msgsData.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No messages</td></tr>'; return; }
    tbody.innerHTML = msgsData.slice(0, 50).map(msg => {
      const time = msg.timestamp && msg.timestamp.toDate ? msg.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + msg.timestamp.toDate().toLocaleDateString() : 'N/A';
      return `<tr><td>${msg.senderName || 'N/A'}</td><td>${escapeHtml(msg.body || '')}</td><td>${msg.channel || 'global'}</td><td>${time}</td><td><button class="action-btn btn-reject" onclick="deleteMsg('${msg.id}')">Delete</button></td></tr>`;
    }).join('');
  }

  window.approveTx = async function(txId, userId, amount, type) {
    try {
      await updateDoc(doc(db, 'transactions', txId), { status: 'approved', approvedAt: serverTimestamp() });
      if (type === 'deposit') {
        const userRef = doc(db, 'users', userId);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
          const currentEggs = userSnap.data().eggs || 0;
          await updateDoc(userRef, { eggs: currentEggs + amount, updatedAt: serverTimestamp() });
        }
      }
      showNotification('Transaction approved!', 'success');
    } catch (e) { showNotification(e.message); }
  };

  window.rejectTx = async function(txId) {
    try {
      await updateDoc(doc(db, 'transactions', txId), { status: 'rejected', rejectedAt: serverTimestamp() });
      showNotification('Transaction rejected', 'success');
    } catch (e) { showNotification(e.message); }
  };

  window.blockUser = async function(userId) {
    try { await updateDoc(doc(db, 'users', userId), { isBlocked: true, updatedAt: serverTimestamp() }); showNotification('User blocked', 'success'); }
    catch (e) { showNotification(e.message); }
  };

  window.unblockUser = async function(userId) {
    try { await updateDoc(doc(db, 'users', userId), { isBlocked: false, updatedAt: serverTimestamp() }); showNotification('User unblocked', 'success'); }
    catch (e) { showNotification(e.message); }
  };

  window.deleteMsg = async function(msgId) {
    try { await deleteDoc(doc(db, 'messages', msgId)); showNotification('Message deleted', 'success'); }
    catch (e) { showNotification(e.message); }
  };

  function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
</script>
</body>
  </html>
