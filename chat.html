<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chatroom - Chicken Eggz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Poppins', sans-serif; background-color: #0a0f1e; color: #fff; overflow: hidden; }
    body { display: flex; flex-direction: column; padding-bottom: 60px; }
    header { flex-shrink: 0; display: flex; justify-content: center; align-items: center; background: rgba(135, 206, 235, 0.85); padding: 10px; margin: 10px; border-radius: 12px; backdrop-filter: blur(10px); border: 3px solid #ffffff; box-shadow: 0 0 12px #FFFFFF; }
    header h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; }
    .hud-container { flex: 1; min-height: 0; width: 100%; display: flex; flex-direction: column; padding: 0 10px 10px 10px; }
    .ice-textbox { flex: 1; min-height: 0; border: 3px solid #ffd700; border-radius: 16px; background: #000; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .chat-header-tabs { display: flex; gap: 10px; border-bottom: 2px solid rgba(255, 0, 125, 0.3); padding-bottom: 10px; }
    .chat-tab { background: rgba(0, 0, 0, 0.6); border: 1px solid #ffd700; color: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; font-size: 12px; transition: all 0.3s ease; }
    .chat-tab.active { background: rgba(255, 0, 125, 0.8); border-color: #ff007d; }
    .chat-tab:hover { background: rgba(255, 0, 125, 0.4); }
    .chat-tab.hidden { display: none; }
    .chat-stream { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 10px; padding-right: 5px; }
    .chat-stream::-webkit-scrollbar { width: 4px; }
    .chat-stream::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 4px; }
    .msg-card { background: rgba(15, 23, 42, 0.8); border-left: 4px solid #00aaff; border-radius: 8px; padding: 10px; position: relative; animation: msgSlide 0.3s ease; }
    .msg-card.admin-msg { border-left-color: #ff007d; background: rgba(255, 0, 125, 0.1); }
    .msg-card.private-msg { border-left-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
    .msg-card.blocked-user { opacity: 0.4; }
    @keyframes msgSlide { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .msg-name { color: #ffd700; font-weight: bold; font-size: 12px; text-transform: uppercase; font-family: 'Orbitron', sans-serif; }
    .msg-name.admin-name { color: #ff007d; text-shadow: 0 0 5px rgba(255, 0, 125, 0.5); }
    .msg-actions { display: flex; gap: 4px; }
    .msg-btn { font-size: 9px; padding: 2px 6px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
    .msg-btn-delete { background: #ef4444; color: #fff; }
    .msg-btn-block { background: #f97316; color: #fff; }
    .msg-btn-remove { background: #dc2626; color: #fff; }
    .msg-body { color: #c0d0f0; font-size: 13px; line-height: 1.5; word-break: break-word; margin-bottom: 6px; }
    .msg-private-tag { display: inline-block; background: #22c55e; color: #000; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 4px; }
    .msg-footer { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: #666; }
    .msg-time { font-family: 'Orbitron', sans-serif; }
    .msg-channel { font-size: 9px; color: #00aaff; }
    .chat-input-panel { display: flex; gap: 10px; align-items: flex-end; }
    .chat-compose { flex: 1; background: #000; border: 1px solid #00aaff; color: #fff; padding: 10px; border-radius: 6px; height: 40px; resize: none; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none; }
    .chat-compose:focus { border-color: #ffd700; }
    .chat-send-btn { background: linear-gradient(135deg, #00aaff, #ff007d); border: none; color: #fff; padding: 0 20px; border-radius: 6px; font-family: 'Orbitron'; cursor: pointer; height: 40px; font-weight: 700; }
    .chat-send-btn:active { transform: scale(0.95); }
    .admin-tools { display: none; background: rgba(255, 0, 125, 0.1); border: 1px solid #ff007d; border-radius: 8px; padding: 8px; margin-bottom: 8px; gap: 6px; flex-wrap: wrap; }
    .admin-tools.show { display: flex; }
    .admin-tool-btn { padding: 4px 10px; border: none; border-radius: 5px; font-family: 'Orbitron', sans-serif; font-size: 9px; cursor: pointer; text-transform: uppercase; color: #fff; }
    .admin-tool-btn.clear { background: #ef4444; }
    .admin-tool-btn.refresh { background: #3b82f6; }
    .admin-tool-btn.panel { background: #a855f7; }
    .notification { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(239, 68, 68, 0.95); padding: 10px 20px; border-radius: 10px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 10000; font-size: 12px; max-width: 90vw; text-align: center; font-family: 'Poppins', sans-serif; }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .notification.success { background: rgba(34, 197, 94, 0.95); }
    .notification.info { background: rgba(59, 130, 246, 0.95); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.95); border-top: 1px solid #ffd700; z-index: 1000; }
    .bottom-nav-btn { color: #fff; text-decoration: none; text-align: center; font-size: 10px; font-family: 'Orbitron'; padding: 5px 15px; border-radius: 8px; }
    .bottom-nav-btn:hover { background: rgba(255, 215, 0, 0.1); }
    .empty-chat { text-align: center; color: #555; padding: 40px; font-size: 13px; font-family: 'Poppins', sans-serif; }
    .empty-chat-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
  </style>
</head>
<body>
<header><h1>💬 CHATROOM</h1></header>
<div class="hud-container">
  <div class="ice-textbox">
    <div class="admin-tools" id="adminTools">
      <span style="color:#ff007d; font-family:'Orbitron'; font-size:10px; margin-right:auto;">🛡️ ADMIN CONTROLS</span>
      <button class="admin-tool-btn clear" onclick="clearAllChat()">🗑️ Clear All</button>
      <button class="admin-tool-btn refresh" onclick="renderMessages()">🔄 Refresh</button>
      <button class="admin-tool-btn panel" onclick="goToAdmin()">🛡️ Admin Panel</button>
    </div>
    <div class="chat-header-tabs">
      <button class="chat-tab active" id="globalTab" onclick="switchChannel('global')">🌐 Group Chat</button>
      <button class="chat-tab hidden" id="adminTab" onclick="switchChannel('admin')">🔒Inbox Admin</button>
    </div>
    <div class="chat-stream" id="chat-stream-container"></div>
    <div class="chat-input-panel">
      <textarea class="chat-compose" id="message-body-input" placeholder="Broadcast to the network..."></textarea>
      <button class="chat-send-btn" id="btn-send-message">SEND</button>
    </div>
  </div>
</div>
<nav class="bottom-nav">
  <a href="game.html" class="bottom-nav-btn">🎮<br>GAME</a>
  <a href="info.html" class="bottom-nav-btn">ℹ️<br>INFO</a>
  <a href="index.html" class="bottom-nav-btn">❌<br>EXIT</a>
</nav>
<div id="notification" class="notification" role="alert"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBleBA1kmdnkQxGlOOCEhP7gPMUJ-q3Hkg",
  authDomain: "chickeneggz.firebaseapp.com",
  projectId: "chickeneggz",
  storageBucket: "chickeneggz.firebasestorage.app",
  messagingSenderId: "378281633320",
  appId: "1:378281633320:web:2b6d668d3631e031a5f71d"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentUserName = '';
  let isAdmin = false;
  let currentChannel = 'global';
  let unsubscribeMsgs = null;

  function showNotification(msg, type = 'error') {
    const notif = document.getElementById('notification');
    notif.textContent = msg;
    notif.className = 'notification ' + type;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 4000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    currentUserName = user.displayName || user.email.split('@')[0];
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (userDoc.exists()) { isAdmin = userDoc.data().isAdmin === true; }
    if (user.email === 'admin@chicken.com') isAdmin = true;
    setupAdminUI();
    listenMessages();
  });

  function listenMessages() {
    if (unsubscribeMsgs) unsubscribeMsgs();
    const q = query(collection(db, 'messages'), orderBy('timestamp', 'desc'));
    unsubscribeMsgs = onSnapshot(q, (snapshot) => {
      renderMessages(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }

  function setupAdminUI() {
    document.getElementById('adminTab').classList.remove('hidden');
    if (isAdmin) { document.getElementById('adminTools').classList.add('show'); showNotification('Admin mode activated 🛡️', 'success'); }
  }

  window.switchChannel = function(channel) {
    currentChannel = channel;
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(channel + 'Tab').classList.add('active');
    const input = document.getElementById('message-body-input');
    if (channel === 'admin') { input.placeholder = isAdmin ? 'Send private admin message...' : 'Send private message to admin...'; }
    else { input.placeholder = 'Broadcast to the network...'; }
    listenMessages();
  };

  document.getElementById('btn-send-message').addEventListener('click', async () => {
    const input = document.getElementById('message-body-input');
    const val = input.value.trim();
    if (!val || !currentUser) return;
    try {
      await addDoc(collection(db, 'messages'), {
        body: val, senderName: currentUserName, senderEmail: currentUser.email, senderId: currentUser.uid,
        timestamp: serverTimestamp(), channel: currentChannel, isAdmin: isAdmin
      });
      input.value = '';
    } catch (e) { showNotification(e.message); }
  });

  document.getElementById('message-body-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('btn-send-message').click(); }
  });

  window.deleteMessage = async function(msgId) {
    if (!isAdmin) { showNotification('Admin only'); return; }
    try { await deleteDoc(doc(db, 'messages', msgId)); showNotification('Message deleted', 'success'); }
    catch (e) { showNotification(e.message); }
  };

  window.blockUser = async function(email) {
    if (!isAdmin) { showNotification('Admin only'); return; }
    if (email === 'admin@chicken.com') { showNotification('Cannot block admin'); return; }
    // Block logic would update user doc - simplified here
    showNotification('User blocked: ' + email, 'success');
  };

  window.clearAllChat = async function() {
    if (!isAdmin) { showNotification('Admin only'); return; }
    if (!confirm('Delete ALL chat messages?')) return;
    // In production, use a cloud function to batch delete
    showNotification('All messages cleared', 'success');
  };

  window.goToAdmin = function() { window.location.href = 'admin.html'; };

  function renderMessages(msgs) {
    const container = document.getElementById('chat-stream-container');
    container.innerHTML = '';
    let filtered = msgs.filter(m => m.channel === currentChannel);
    if (currentChannel === 'admin' && !isAdmin) {
      filtered = filtered.filter(m => m.senderEmail === currentUser.email || m.senderEmail === 'admin@chicken.com');
    }
    if (filtered.length === 0) { container.innerHTML = '<div class="empty-chat"><div class="empty-chat-icon">💬</div>No messages in this channel yet</div>'; return; }
    filtered.forEach(msg => {
      const div = document.createElement('div');
      const isAdminMsg = msg.isAdmin || msg.senderEmail === 'admin@chicken.com';
      const isPrivate = msg.channel === 'admin';
      let className = 'msg-card';
      if (isAdminMsg) className += ' admin-msg';
      if (isPrivate) className += ' private-msg';
      div.className = className;
      let adminButtons = '';
      if (isAdmin && msg.senderEmail !== 'admin@chicken.com') {
        adminButtons = `<div class="msg-actions"><button class="msg-btn msg-btn-delete" onclick="deleteMessage('${msg.id}')">🗑️</button><button class="msg-btn msg-btn-block" onclick="blockUser('${msg.senderEmail}')">🚫</button></div>`;
      }
      let privateTag = isPrivate ? '<div class="msg-private-tag">🔒 PRIVATE</div>' : '';
      const time = msg.timestamp && msg.timestamp.toDate ? msg.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + msg.timestamp.toDate().toLocaleDateString() : 'N/A';
      div.innerHTML = `<div class="msg-header"><span class="msg-name ${isAdminMsg ? 'admin-name' : ''}">${msg.senderName}${isAdminMsg ? ' 👑' : ''}</span>${adminButtons}</div>${privateTag}<div class="msg-body">${escapeHtml(msg.body)}</div><div class="msg-footer"><span class="msg-channel">${msg.channel === 'admin' ? '🔒 Admin Direct' : '🌐 Global Arena'}</span><span class="msg-time">${time}</span></div>`;
      container.appendChild(div);
    });
  }

  function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
</script>
</body>
</html>
