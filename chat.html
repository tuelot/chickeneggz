<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chatroom - Chicken Eggz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { 
      height: 100%; 
      font-family: 'Poppins', sans-serif; 
      background-color: #0a0f1e; 
      color: #fff; 
      overflow: hidden; 
    }

    body {
      display: flex;
      flex-direction: column;
      padding-bottom: 60px;
    }

    header { 
      flex-shrink: 0;
      display: flex; justify-content: center; align-items: center; 
      background: rgba(135, 206, 235, 0.85); padding: 10px; margin: 10px; 
      border-radius: 12px; backdrop-filter: blur(10px); 
      border: 3px solid #ffffff; box-shadow: 0 0 12px #FFFFFF; 
    }
    header h1 { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #fff; }

    .hud-container { 
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex; flex-direction: column; 
      padding: 0 10px 10px 10px; 
    }

    .ice-textbox { 
      flex: 1; min-height: 0; border: 3px solid #ffd700; 
      border-radius: 16px; background: #000; padding: 15px; 
      display: flex; flex-direction: column; gap: 10px; 
    }

    .chat-header-tabs { display: flex; gap: 10px; border-bottom: 2px solid rgba(255, 0, 125, 0.3); padding-bottom: 10px; }
    .chat-tab { 
      background: rgba(0, 0, 0, 0.6); border: 1px solid #ffd700; 
      color: #fff; padding: 5px 10px; border-radius: 6px; 
      cursor: pointer; font-family: 'Orbitron'; font-size: 12px; 
      transition: all 0.3s ease;
    }
    .chat-tab.active { background: rgba(255, 0, 125, 0.8); border-color: #ff007d; }
    .chat-tab:hover { background: rgba(255, 0, 125, 0.4); }
    .chat-tab.hidden { display: none; }

    .chat-stream { 
      flex: 1; overflow-y: auto; display: flex; 
      flex-direction: column-reverse; gap: 10px; 
      padding-right: 5px;
    }
    .chat-stream::-webkit-scrollbar { width: 4px; }
    .chat-stream::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 4px; }

    .msg-card { 
      background: rgba(15, 23, 42, 0.8); 
      border-left: 4px solid #00aaff; 
      border-radius: 8px; padding: 10px; 
      position: relative;
      animation: msgSlide 0.3s ease;
    }
    .msg-card.admin-msg { border-left-color: #ff007d; background: rgba(255, 0, 125, 0.1); }
    .msg-card.private-msg { border-left-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
    .msg-card.blocked-user { opacity: 0.4; }
    @keyframes msgSlide { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .msg-name { 
      color: #ffd700; font-weight: bold; font-size: 12px; 
      text-transform: uppercase; font-family: 'Orbitron', sans-serif;
    }
    .msg-name.admin-name { color: #ff007d; text-shadow: 0 0 5px rgba(255, 0, 125, 0.5); }
    .msg-actions { display: flex; gap: 4px; }
    .msg-btn {
      font-size: 9px; padding: 2px 6px; border: none; border-radius: 4px;
      cursor: pointer; font-family: 'Orbitron', sans-serif; text-transform: uppercase;
    }
    .msg-btn-delete { background: #ef4444; color: #fff; }
    .msg-btn-block { background: #f97316; color: #fff; }
    .msg-btn-remove { background: #dc2626; color: #fff; }

    .msg-body { 
      color: #c0d0f0; font-size: 13px; line-height: 1.5; 
      word-break: break-word; margin-bottom: 6px;
    }
    .msg-private-tag { 
      display: inline-block; background: #22c55e; color: #000; 
      font-size: 9px; padding: 1px 6px; border-radius: 4px; 
      font-weight: bold; margin-bottom: 4px;
    }
    .msg-footer { 
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; color: #666; 
    }
    .msg-time { font-family: 'Orbitron', sans-serif; }
    .msg-channel { font-size: 9px; color: #00aaff; }

    .chat-input-panel { display: flex; gap: 10px; align-items: flex-end; }
    .chat-compose { 
      flex: 1; background: #000; border: 1px solid #00aaff; 
      color: #fff; padding: 10px; border-radius: 6px; 
      height: 40px; resize: none; font-family: 'Poppins', sans-serif; 
      font-size: 13px; outline: none;
    }
    .chat-compose:focus { border-color: #ffd700; }
    .chat-send-btn { 
      background: linear-gradient(135deg, #00aaff, #ff007d); 
      border: none; color: #fff; padding: 0 20px; 
      border-radius: 6px; font-family: 'Orbitron'; 
      cursor: pointer; height: 40px; font-weight: 700;
    }
    .chat-send-btn:active { transform: scale(0.95); }

    .admin-tools {
      display: none;
      background: rgba(255, 0, 125, 0.1);
      border: 1px solid #ff007d;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      gap: 6px;
      flex-wrap: wrap;
    }
    .admin-tools.show { display: flex; }
    .admin-tool-btn {
      padding: 4px 10px; border: none; border-radius: 5px;
      font-family: 'Orbitron', sans-serif; font-size: 9px;
      cursor: pointer; text-transform: uppercase; color: #fff;
    }
    .admin-tool-btn.clear { background: #ef4444; }
    .admin-tool-btn.refresh { background: #3b82f6; }
    .admin-tool-btn.panel { background: #a855f7; }

    .notification {
      position: fixed; bottom: 70px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(239, 68, 68, 0.95);
      padding: 10px 20px; border-radius: 10px;
      opacity: 0; transition: all 0.3s ease;
      pointer-events: none; z-index: 10000;
      font-size: 12px; max-width: 90vw;
      text-align: center; font-family: 'Poppins', sans-serif;
    }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .notification.success { background: rgba(34, 197, 94, 0.95); }
    .notification.info { background: rgba(59, 130, 246, 0.95); }

    .bottom-nav { 
      position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
      display: flex; justify-content: space-around; align-items: center; 
      background: rgba(0,0,0,0.95); border-top: 1px solid #ffd700; z-index: 1000; 
    }
    .bottom-nav-btn { 
      color: #fff; text-decoration: none; text-align: center; 
      font-size: 10px; font-family: 'Orbitron'; 
      padding: 5px 15px; border-radius: 8px;
    }
    .bottom-nav-btn:hover { background: rgba(255, 215, 0, 0.1); }

    .empty-chat { 
      text-align: center; color: #555; padding: 40px; 
      font-size: 13px; font-family: 'Poppins', sans-serif;
    }
    .empty-chat-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
  </style>
</head>
<body>

<header><h1>💬 CHATROOM</h1></header>

<div class="hud-container">
  <div class="ice-textbox">

    <!-- Admin Tools Bar -->
    <div class="admin-tools" id="adminTools">
      <span style="color:#ff007d; font-family:'Orbitron'; font-size:10px; margin-right:auto;">🛡️ ADMIN CONTROLS</span>
      <button class="admin-tool-btn clear" onclick="clearAllChat()">🗑️ Clear All</button>
      <button class="admin-tool-btn refresh" onclick="renderMessages()">🔄 Refresh</button>
      <button class="admin-tool-btn panel" onclick="goToAdmin()">🛡️ Admin Panel</button>
    </div>

    <div class="chat-header-tabs">
      <button class="chat-tab active" id="globalTab" onclick="switchChannel('global')">🌐 Group Chat</button>
      <button class="chat-tab hidden" id="adminTab" onclick="switchChannel('admin')">🔒Inbox Admin</button>
    </div>

    <div class="chat-stream" id="chat-stream-container"></div>

    <div class="chat-input-panel">
      <textarea class="chat-compose" id="message-body-input" placeholder="Broadcast to the network..."></textarea>
      <button class="chat-send-btn" id="btn-send-message">SEND</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="game.html" class="bottom-nav-btn">🎮<br>GAME</a>
  <a href="info.html" class="bottom-nav-btn">ℹ️<br>INFO</a>
  <a href="index.html" class="bottom-nav-btn">❌<br>EXIT</a>
</nav>

<div id="notification" class="notification" role="alert"></div>

<script>
  // ===== LOCAL STORAGE KEYS =====
  const STORAGE_KEYS = {
    MESSAGES: 'chicken_chat_messages',
    BLOCKED_USERS: 'chicken_chat_blocked',
    REMOVED_USERS: 'chicken_chat_removed',
    USERNAME: 'chicken_chat_username',
    SESSION: 'chickenEmpire_v1.session',
    USERS: 'chickenAdmin_users'
  };

  let currentChannel = 'global';
  let isAdmin = false;
  let currentUserEmail = '';
  let currentUserName = '';

  // ===== NOTIFICATION =====
  function showNotification(msg, type = 'error') {
    const notif = document.getElementById('notification');
    notif.textContent = msg;
    notif.className = 'notification ' + type;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 4000);
  }

  // ===== AUTH CHECK =====
  function checkAuth() {
    // Check game session
    const session = getStore(STORAGE_KEYS.SESSION);
    if (session && session.email) {
      currentUserEmail = session.email;
      currentUserName = session.name || session.email.split('@')[0];

      // Check if admin
      const users = getStore(STORAGE_KEYS.USERS) || {};
      const entry = Object.entries(users).find(([uid, u]) => u.email === currentUserEmail);
      if (entry) {
        isAdmin = entry[1].isAdmin === true;
      }

      // Also check if this is the hardcoded admin
      if (currentUserEmail === 'admin@chicken.com') {
        isAdmin = true;
      }

      return true;
    }

    // Fallback: check if admin session exists
    const adminSession = localStorage.getItem('chickenAdmin_session');
    if (adminSession) {
      try {
        const admin = JSON.parse(adminSession);
        if (admin.email === 'admin@chicken.com') {
          currentUserEmail = 'admin@chicken.com';
          currentUserName = 'Administrator';
          isAdmin = true;
          return true;
        }
      } catch(e) {}
    }

    return false;
  }

  function getStore(key) {
    try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : null; }
    catch (e) { return null; }
  }

  function setStore(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function now() {
    return new Date().toISOString();
  }

  function formatTime(timestamp) {
    const d = new Date(timestamp);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' ' + d.toLocaleDateString();
  }

  // ===== GET USERNAME =====
  function getUsername() {
    if (currentUserName) return currentUserName;
    let name = localStorage.getItem(STORAGE_KEYS.USERNAME);
    if (!name) {
      name = 'Pilot' + Math.floor(Math.random() * 9999);
      localStorage.setItem(STORAGE_KEYS.USERNAME, name);
    }
    return name;
  }

  // ===== BLOCKED / REMOVED CHECKS =====
  function getBlockedUsers() {
    return getStore(STORAGE_KEYS.BLOCKED_USERS) || [];
  }

  function getRemovedUsers() {
    return getStore(STORAGE_KEYS.REMOVED_USERS) || [];
  }

  function isUserBlocked(email) {
    return getBlockedUsers().includes(email);
  }

  function isUserRemoved(email) {
    return getRemovedUsers().includes(email);
  }

  // ===== MESSAGES =====
  function getMessages() {
    const raw = localStorage.getItem(STORAGE_KEYS.MESSAGES);
    let msgs = raw ? JSON.parse(raw) : [];
    // Auto-assign IDs to old messages that don't have them
    let needsSave = false;
    msgs.forEach(m => {
      if (!m.id) {
        m.id = 'msg_' + (m.timestamp || Date.now()) + '_' + Math.random().toString(36).substr(2, 6);
        needsSave = true;
      }
    });
    if (needsSave) saveMessages(msgs);
    return msgs;
  }

  function saveMessages(msgs) {
    localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(msgs));
  }

  function addMessage(body, channel) {
    if (!checkAuth()) {
      showNotification('Please login to chat');
      return false;
    }

    // Check if current user is blocked or removed
    if (isUserBlocked(currentUserEmail)) {
      showNotification('You have been blocked from posting');
      return false;
    }
    if (isUserRemoved(currentUserEmail)) {
      showNotification('You have been removed from chat');
      return false;
    }

    const msgs = getMessages();
    msgs.push({
      id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      body: body,
      senderName: getUsername(),
      senderEmail: currentUserEmail,
      timestamp: Date.now(),
      channel: channel || 'global',
      isAdmin: isAdmin
    });
    saveMessages(msgs);
    renderMessages();
    return true;
  }

  // ===== ADMIN ACTIONS =====
  function deleteMessage(msgId) {
    if (!isAdmin) { showNotification('Admin only'); return; }
    if (!msgId) { showNotification('Cannot delete: message ID missing', 'error'); return; }

    let msgs = getMessages();
    const beforeCount = msgs.length;
    msgs = msgs.filter(m => m.id !== msgId);

    if (msgs.length === beforeCount) {
      showNotification('Message not found. It may have been already deleted.', 'info');
      return;
    }

    saveMessages(msgs);
    renderMessages();
    showNotification('Message deleted! (' + (beforeCount - msgs.length) + ' removed)', 'success');
  }

  function blockUser(email) {
    if (!isAdmin) { showNotification('Admin only'); return; }
    if (email === 'admin@chicken.com') { showNotification('Cannot block admin', 'error'); return; }
    const blocked = getBlockedUsers();
    if (!blocked.includes(email)) {
      blocked.push(email);
      setStore(STORAGE_KEYS.BLOCKED_USERS, blocked);
      showNotification('User blocked: ' + email, 'success');
      renderMessages();
    }
  }

  function removeUser(email) {
    if (!isAdmin) { showNotification('Admin only'); return; }
    if (email === 'admin@chicken.com') { showNotification('Cannot remove admin', 'error'); return; }
    const removed = getRemovedUsers();
    if (!removed.includes(email)) {
      removed.push(email);
      setStore(STORAGE_KEYS.REMOVED_USERS, removed);
      showNotification('User removed: ' + email, 'success');
      renderMessages();
    }
  }

  function unblockUser(email) {
    if (!isAdmin) { showNotification('Admin only'); return; }
    let blocked = getBlockedUsers();
    blocked = blocked.filter(e => e !== email);
    setStore(STORAGE_KEYS.BLOCKED_USERS, blocked);
    showNotification('User unblocked: ' + email, 'success');
    renderMessages();
  }

  function clearAllChat() {
    if (!isAdmin) { showNotification('Admin only'); return; }
    if (!confirm('Delete ALL chat messages?')) return;
    localStorage.removeItem(STORAGE_KEYS.MESSAGES);
    renderMessages();
    showNotification('All messages cleared', 'success');
  }

  function goToAdmin() {
    window.location.href = 'admin.html';
  }

  // ===== RENDER =====
  function renderMessages() {
    const container = document.getElementById('chat-stream-container');
    const msgs = getMessages();
    const blocked = getBlockedUsers();
    const removed = getRemovedUsers();

    container.innerHTML = '';

    // Filter by channel
    let filtered = msgs.filter(m => m.channel === currentChannel);

    // Admin sees ALL messages in admin channel, regular users see only their own + admin replies
    if (currentChannel === 'admin' && !isAdmin) {
      filtered = filtered.filter(m => m.senderEmail === currentUserEmail || m.senderEmail === 'admin@chicken.com');
    }

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-chat"><div class="empty-chat-icon">💬</div>No messages in this channel yet</div>';
      return;
    }

    filtered.slice().reverse().forEach(msg => {
      // Ensure message has an ID (for backwards compatibility with old messages)
      if (!msg.id) {
        msg.id = 'msg_' + msg.timestamp + '_' + Math.random().toString(36).substr(2, 6);
      }

      const div = document.createElement('div');
      const isBlocked = blocked.includes(msg.senderEmail);
      const isRemoved = removed.includes(msg.senderEmail);
      const isOwnMessage = msg.senderEmail === currentUserEmail;
      const isAdminMsg = msg.isAdmin || msg.senderEmail === 'admin@chicken.com';
      const isPrivate = msg.channel === 'admin';

      let className = 'msg-card';
      if (isAdminMsg) className += ' admin-msg';
      if (isPrivate) className += ' private-msg';
      if ((isBlocked || isRemoved) && !isAdmin) className += ' blocked-user';

      div.className = className;

      // Build admin action buttons
      let adminButtons = '';
      if (isAdmin && msg.senderEmail !== 'admin@chicken.com') {
        adminButtons = `
          <div class="msg-actions">
            <button class="msg-btn msg-btn-delete" onclick="deleteMessage('${msg.id}')">🗑️</button>
            ${isBlocked 
              ? `<button class="msg-btn msg-btn-block" onclick="unblockUser('${msg.senderEmail}')">✅</button>`
              : `<button class="msg-btn msg-btn-block" onclick="blockUser('${msg.senderEmail}')">🚫</button>`
            }
            ${!isRemoved 
              ? `<button class="msg-btn msg-btn-remove" onclick="removeUser('${msg.senderEmail}')">❌</button>`
              : ''
            }
          </div>
        `;
      }

      // Private tag
      let privateTag = '';
      if (isPrivate) {
        privateTag = '<div class="msg-private-tag">🔒 PRIVATE</div>';
      }

      div.innerHTML = `
        <div class="msg-header">
          <span class="msg-name ${isAdminMsg ? 'admin-name' : ''}">${msg.senderName}${isAdminMsg ? ' 👑' : ''}</span>
          ${adminButtons}
        </div>
        ${privateTag}
        <div class="msg-body">${escapeHtml(msg.body)}</div>
        <div class="msg-footer">
          <span class="msg-channel">${msg.channel === 'admin' ? '🔒 Admin Direct' : '🌐 Global Arena'}</span>
          <span class="msg-time">${formatTime(msg.timestamp)}</span>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ===== CHANNEL SWITCHING =====
  function switchChannel(channel) {
    currentChannel = channel;
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(channel + 'Tab').classList.add('active');

    // Update placeholder
    const input = document.getElementById('message-body-input');
    if (channel === 'admin') {
      input.placeholder = isAdmin ? 'Send private admin message...' : 'Send private message to admin...';
    } else {
      input.placeholder = 'Broadcast to the network...';
    }

    renderMessages();
  }

  // ===== SETUP ADMIN UI =====
  function setupAdminUI() {
    // Show Admin Direct tab for ALL users (users can message admin privately)
    document.getElementById('adminTab').classList.remove('hidden');

    if (isAdmin) {
      // Show admin tools bar
      document.getElementById('adminTools').classList.add('show');
      showNotification('Admin mode activated 🛡️', 'success');
    }
  }

  // ===== EVENT LISTENERS =====
  document.getElementById('btn-send-message').addEventListener('click', () => {
    const input = document.getElementById('message-body-input');
    const val = input.value.trim();
    if (!val) return;

    if (!checkAuth()) {
      showNotification('Please login first');
      return;
    }

    if (addMessage(val, currentChannel)) {
      input.value = '';
    }
  });

  document.getElementById('message-body-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('btn-send-message').click();
    }
  });

  // ===== INIT =====
  checkAuth();
  setupAdminUI();
  renderMessages();

  // Auto-refresh every 3 seconds to see new messages
  setInterval(renderMessages, 3000);
</script>
</body>
</html>
