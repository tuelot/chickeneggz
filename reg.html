<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Register</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: 'Poppins', system-ui, sans-serif;
      background-color: transparent; color: #fff;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .bg-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
    .bg-layer img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .bg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 1; }

    .cloud-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    .cloud { position: absolute; background: #ffffff; border-radius: 100px;
      box-shadow: 0 0 12px rgba(255,255,255,0.95), inset -10px -10px 22px rgba(219,234,254,0.95);
      animation: floatClouds linear infinite; }
    .cloud::before, .cloud::after { content: ''; position: absolute; background: #ffffff; border-radius: 50%; box-shadow: inset -6px -6px 16px rgba(219,234,254,0.95); }
    .cloud.size-l { width: 100px; height: 35px; }
    .cloud.size-l::before { width: 50px; height: 50px; top: -28px; left: 15px; }
    .cloud.size-l::after { width: 38px; height: 38px; top: -18px; right: 15px; }
    .cloud.size-s { width: 45px; height: 16px; }
    .cloud.size-s::before { width: 22px; height: 22px; top: -12px; left: 7px; }
    .cloud.size-s::after { width: 17px; height: 17px; top: -8px; right: 7px; }
    .cloud.size-m { width: 70px; height: 25px; }
    .cloud.size-m::before { width: 35px; height: 35px; top: -20px; left: 10px; }
    .cloud.size-m::after { width: 28px; height: 28px; top: -14px; right: 10px; }

    @keyframes floatClouds { 0% { transform: translateX(-120%); } 100% { transform: translateX(100vw); } }

    header {
    justify-content: center; align-items: center;
      background: rgba(135, 206, 235, 0.85);
  margin-top:60px;
  margin-bottom:2px;
  margin-left: 60px;
  margin-right: 60px;
  border-radius: 12px;
      backdrop-filter: blur(30px); border: 8px solid #ffffff;
      box-shadow: 0 0 12px #FFFFFF, inset 0 0 12px #00aaff;
      position: relative; z-index: 12;
    }
    .logo {
      font-family: 'Fredoka One', cursive; color: #ffffff;
      text-shadow: 0 0 20px #00aaff; font-size: 30px;
      white-space: nowrap; text-align: center;
    }

    .notification { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(239,68,68,0.95); padding: 14px 28px; border-radius: 12px; opacity: 0;
      transition: all 0.3s ease; pointer-events: none; z-index: 10000; font-size: 14px;
      max-width: 90vw; text-align: center; font-family: 'Poppins', sans-serif; border: 2px solid rgba(255,255,255,0.3); }
    .notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .notification.success { background: rgba(34,197,94,0.95); }
    .notification.info { background: rgba(59,130,246,0.95); }

    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex;
      justify-content: space-around; align-items: center; background: transparent;
      padding: 4px 0 6px; z-index: 500; pointer-events: auto; height: 32px; }
    .bottom-nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; text-decoration: none; color: #fff; padding: 2px 12px; border-radius: 8px;
      transition: all 0.2s ease; min-width: 60px; min-height: 36px; border: 1px solid transparent; }
    .bottom-nav-btn:hover, .bottom-nav-btn:focus { background: rgba(255,255,255,0.08); border-color: #A1887F; color: #ffffff; outline: none; }
    .bottom-nav-btn:active { transform: scale(0.95); }
    .bottom-nav-icon { font-size: 18px; line-height: 1; filter: drop-shadow(0 0 2px rgba(0,0,0,0.3)); }
    .bottom-nav-label { font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 1000;
      letter-spacing: 0.5px; text-transform: uppercase; color: #ffffff; transition: color 0.2s ease; }
    .bottom-nav-btn:hover .bottom-nav-label, .bottom-nav-btn:focus .bottom-nav-label {
      color: #FFD700; text-shadow: 0 0 5px #ffd700, 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 40px #00aaff, 0 0 80px #00aaff; }

    .register-container { 
      position: relative; z-index: 8;
      align-items: center; justify
      height: 400px;
      padding: 60px 20px; 
      margin-bottom:120px;
      border-radius: 12px; 
    }
    .register-card { 
      background: rgba(10,20,50,0.95); backdrop-filter: blur(20px);
      border: 5px solid #FFD700; border-radius: 20px; 
      padding: 20px 25px;
      width: 100%; max-width: 550px; 
      box-shadow: 0 0 30px rgba(255,215,0,0.1); 
      overflow: hidden; 
    }
    .register-title { font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 900;
      text-align: center; color: #FFD700; margin-bottom: 12px; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    .form-group { margin-bottom: 8px; }
    .form-label { display: block; font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 600;
      color: #a0b0d0; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .form-input { width: 100%; padding: 8px 12px; background: rgba(10,15,30,0.8);
      border: 2px solid rgba(255,215,0,0.2); border-radius: 12px; color: #fff;
      font-family: 'Poppins', sans-serif; font-size: 13px; outline: none; transition: all 0.3s ease; }
    .form-input:focus { border-color: #FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
    .form-input::placeholder { color: #5a6a8a; }
    .register-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #FFD700, #FFA500);
      border: none; border-radius: 12px; color: #0a0f1e; font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 900; cursor: pointer; transition: all 0.3s ease;
      text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; box-shadow: 0 4px 15px rgba(255,215,0,0.3); }
    .register-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,215,0,0.5); }
    .register-btn:active { transform: translateY(0); }
    .register-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-link { text-align: center; margin-top: 10px; font-family: 'Poppins', sans-serif;
      font-size: 12px; color: #a0b0d0; }
    .login-link a { color: #FFD700; text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
    .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #0a0f1e;
      border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0f1e; z-index: 20000; display: none; align-items: center;
      justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: #0a0f1e; border: 2px solid #FFD700; border-radius: 20px;
      padding: 35px 30px; max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 0 40px rgba(255,215,0,0.2); animation: modalPop 0.4s ease; }
    @keyframes modalPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-icon { font-size: 60px; margin-bottom: 15px; }
    .modal-title { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;
      color: #FFD700; margin-bottom: 15px; }
    .modal-text { font-family: 'Poppins', sans-serif; font-size: 14px; color: #c0d0f0;
      line-height: 1.6; margin-bottom: 25px; }
    .modal-btn { padding: 14px 32px; background: linear-gradient(135deg, #FFD700, #FFA500);
      border: none; border-radius: 10px; color: #0a0f1e; font-family: 'Orbitron', sans-serif;
      font-size: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

    .hud-container { position: relative; z-index: 2; height: 100vh; width: 100vw; overflow: hidden; }
  </style>
</head>
<body>

  <div class="bg-layer"><img src="Green.png" alt="Green Background"></div>
  <div class="bg-overlay"></div>

  <div class="cloud-container" aria-hidden="true">
    <div class="cloud size-s" style="top: 14%; animation-duration: 80s; animation-delay: -5s;"></div>
    <div class="cloud size-m" style="top: 16%; animation-duration: 85s; animation-delay: -18s;"></div>
    <div class="cloud size-l" style="top: 18%; animation-duration: 130s; animation-delay: -10s;"></div>
    <div class="cloud size-m" style="top: 20%; animation-duration: 75s; animation-delay: -25s;"></div>
  </div>

  <div class="hud-container">
    <header><div class="logo">Chicken Eggz</div></header>

    <div class="register-container">
      <div class="register-card">
        <div class="register-title">🐣 CREATE ACCOUNT</div>
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="regName">Full Name</label>
            <input type="text" class="form-input" id="regName" placeholder="Enter your name" required autocomplete="name" aria-label="Full Name">
          </div>
          <div class="form-group">
            <label class="form-label" for="regEmail">Email Address</label>
            <input type="email" class="form-input" id="regEmail" placeholder="your@email.com" required autocomplete="email" aria-label="Email Address" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
          </div>
          <div class="form-group">
            <label class="form-label" for="regCell">Cell Number</label>
            <input type="tel" class="form-input" id="regCell" placeholder="0712345678" required autocomplete="tel" aria-label="Cell Number" pattern="0[6-8][0-9]{8}" title="Enter a valid SA cell number (e.g., 0712345678)">
          </div>
          <div class="form-group">
            <label class="form-label" for="regPassword">Password</label>
            <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" aria-label="Password">
          </div>
          <div class="form-group">
            <label class="form-label" for="regConfirmPassword">Confirm Password</label>
            <input type="password" class="form-input" id="regConfirmPassword" placeholder="Re-enter password" required minlength="6" autocomplete="new-password" aria-label="Confirm Password">
          </div>
          <button type="submit" class="register-btn" id="registerBtn">REGISTER</button>
        </form>
        <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="visitor.html" class="bottom-nav-btn"><span class="bottom-nav-icon">ℹ️</span><span class="bottom-nav-label">info</span></a>
    <a href="login.html" class="bottom-nav-btn"><span class="bottom-nav-icon">🐣</span><span class="bottom-nav-label">Login</span></a>
    <a href="index.html" class="bottom-nav-btn"><span class="bottom-nav-icon">❌</span><span class="bottom-nav-label">Exit</span></a>
  </nav>

  <div class="modal-overlay" id="approvalModal">
    <div class="modal-card">
      <div class="modal-icon">⏳</div>
      <div class="modal-title">REGISTRATION SUCCESSFUL!</div>
      <div class="modal-text">
        Your account has been created and is pending admin approval.<br><br>
        Please wait for the administrator to review and approve your account before you can start playing.
      </div>
      <button class="modal-btn" onclick="window.location.href='login.html'">GO TO LOGIN</button>
    </div>
  </div>

  <div id="notification" class="notification" role="alert" aria-live="polite"></div>

  <script>
    // ===== LOCAL STORAGE KEYS (must match admin panel) =====
    const DB_KEYS = {
      USERS: 'chickenAdmin_users',
      SESSION: 'chickenEmpire_v1.session',
      GAME_EGGS: 'chickenEmpire_v1.eggs'
    };

    function showNotification(msg, type = 'error') {
      const notif = document.getElementById('notification');
      if (!notif) return;
      notif.textContent = msg;
      notif.className = 'notification ' + type;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 5000);
    }

    function getStore(key) {
      try { const data = localStorage.getItem(key); return data ? JSON.parse(data) : null; }
      catch (e) { return null; }
    }

    function setStore(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function generateId() {
      return 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function now() {
      return new Date().toISOString();
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // ============================================
    // USER REGISTRATION
    // ============================================
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim().toLowerCase();
      const cell = document.getElementById('regCell').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;

      // Validation
      if (!name || !email || !cell || !password || !confirmPassword) {
        showNotification('Please fill in all fields');
        return;
      }
      if (password.length < 6) {
        showNotification('Password must be at least 6 characters');
        return;
      }
      if (password !== confirmPassword) {
        showNotification('Passwords do not match. Please try again.');
        return;
      }
      if (!validateEmail(email)) {
        showNotification('Please enter a valid email address');
        return;
      }
      // SA cell validation
      const cellRegex = /^0[6-8][0-9]{8}$/;
      if (!cellRegex.test(cell)) {
        showNotification('Please enter a valid SA cell number (e.g., 0712345678)');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.innerHTML = 'CREATING ACCOUNT... <span class="loading-spinner"></span>';

      // Get existing users from chickenAdmin_users
      const users = getStore(DB_KEYS.USERS) || {};

      // Check if email already exists
      const exists = Object.values(users).some(u => u.email === email);
      if (exists) {
        showNotification('This email is already registered. Please login instead.');
        registerBtn.disabled = false;
        registerBtn.innerHTML = 'REGISTER';
        return;
      }

      // Check if this is the admin email
      const isAdminEmail = email === 'admin@chicken.com';

      // Create new user
      const uid = generateId();
      users[uid] = {
        uid: uid,
        name: name,
        email: email,
        cellNumber: cell,
        password: password,        // stored for local login
        isAdmin: isAdminEmail,     // Auto-admin if admin email
        isBlocked: false,
        status: isAdminEmail ? 'approved' : 'pending',  // Auto-approve admin
        eggs: isAdminEmail ? 999999 : 0,
        isSystemAdmin: isAdminEmail || false,  // Protect admin account
        createdAt: now(),
        updatedAt: now()
      };

      // Save to chickenAdmin_users (admin panel reads this)
      setStore(DB_KEYS.USERS, users);

      // Also create a game session so user is logged in
      setStore(DB_KEYS.SESSION, {
        uid: uid,
        email: email,
        name: name,
        loggedInAt: now()
      });

      // Initialize game eggs to 0
      localStorage.setItem(DB_KEYS.GAME_EGGS, '0');

      console.log('User registered. UID:', uid);
      console.log('Saved to chickenAdmin_users:', users[uid]);

      // Show approval modal
      document.getElementById('approvalModal').classList.add('show');
    });
  </script>
</body>
</html>
